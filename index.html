  const aInp = document.getElementById('edBoxModeAngleInput');
  if (aInp) aInp.value = edBoxModeRot;
}

function edSetAngleFromInput() {
  const v = parseInt(document.getElementById('edBoxModeAngleInput').value) || 0;
  edBoxModeRot = v;
  edBoxModeRotSet = true;
}

// 그룹 필터링 상태
let edFilteredUnits = [];  // 그룹 필터 적용된 유닛 목록

// 시트 '그룹' 열 기반 탭 렌더
function edRenderSheetGroupTabs(bName) {
  const container = document.getElementById('edSheetGroupTabs');
  container.innerHTML = '';
  const groups = [...new Set(edUnits.map(u => u.그룹).filter(Boolean))];
  if (groups.length === 0) {
    container.innerHTML = '<span style="font-size:9px;color:var(--text3)">시트에 \'그룹\' 열이 없거나 비어 있음</span>';
    return;
  }
  groups.sort((a, b) => GROUP_ORDER(a) - GROUP_ORDER(b));
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'ed-dong-tab' + (g === edGroupNameVal ? ' active' : '');
    btn.textContent = g;
    const cnt = edUnits.filter(u => u.그룹 === g).length;
    btn.title = `${cnt}개 호실`;
    btn.addEventListener('click', () => edSelectSheetGroup(bName, g));
    container.appendChild(btn);
  });
}

// 시트 그룹 선택 → 해당 호실만 필터 + 저장된 이미지/박스 로드
function edSelectSheetGroup(bName, gName) {
  edGroupNameVal = gName;
  edFilteredUnits = edUnits.filter(u => u.그룹 === gName);
  edActiveDong = '전체';

  // 저장된 평면도가 있으면 로드
  const fpGroups = floorplans[bName];
  if (fpGroups && fpGroups[gName]) {
    edLoadGroup(bName, gName);
  } else {
    // 새 그룹 — 이미지 없음
    edBoxes = {};
    edImageURL = '';
    document.getElementById('ed-floorplan-img').src = '';
    document.getElementById('edDropzone').classList.remove('has-file');
    document.getElementById('edCanvasScroller').style.display = 'none';
    document.getElementById('edZoomBar').style.display = 'none';
    edRenderAllBoxes();
  }

  edRenderSheetGroupTabs(bName);
  edRenderGroupTabs(bName);
  edRenderDongTabs();
  edRenderUnitList();
  showToast(`✅ "${gName}" — ${edFilteredUnits.length}개 호실`);
}

// 구 edApplyGroupName 호환
function edApplyGroupName() { edApplyGroup(); }

// ── 정렬 가이드라인 렌더 ──
function edUpdateAlignGuide() {
  const wr = document.getElementById('edCanvasWrapper');
  if (!wr) return;
  // X축 (세로선)
  edCreateOrUpdateGuideX(wr, 'edAlignGuideX', edBoxMode && edAxisXOn, edAxisXPos, edAxisXAnchor === 'left' ? '← L' : 'R →');
  // Y축 (가로선)
  edCreateOrUpdateGuideY(wr, 'edAlignGuideY', edBoxMode && edAxisYOn, edAxisYPos, edAxisYAnchor === 'top' ? '↑ T' : 'B ↓');
}

function edCreateOrUpdateGuideX(wr, guideId, isOn, xPos, labelText) {
  let guide = document.getElementById(guideId);
  if (!isOn) { if (guide) guide.classList.remove('visible'); return; }
  if (!guide) {
    guide = document.createElement('div');
    guide.id = guideId;
    guide.className = 'ed-align-guide';
    const line = document.createElement('div'); line.className = 'ed-align-guide-line'; guide.appendChild(line);
    const label = document.createElement('div'); label.className = 'ed-align-guide-label'; guide.appendChild(label);
    wr.appendChild(guide);
    guide.addEventListener('mousedown', ev => {
      ev.preventDefault(); ev.stopPropagation();
      const startX = ev.clientX, startPos = edAxisXPos;
      const move = mv => {
        edAxisXPos = Math.max(0, Math.min(98, startPos + (mv.clientX - startX) / (edImgNW * edZoom) * 100));
        edUpdateAlignGuide();
        // 가이드 위치만 갱신 (기존 박스는 움직이지 않음)
      };
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    });
  }
  guide.classList.add('visible'); guide.classList.remove('snap-off');
  guide.style.left = xPos + '%';
  guide.querySelector('.ed-align-guide-label').textContent = labelText;
}

function edCreateOrUpdateGuideY(wr, guideId, isOn, yPos, labelText) {
  let guide = document.getElementById(guideId);
  if (!isOn) { if (guide) guide.classList.remove('visible'); return; }
  if (!guide) {
    guide = document.createElement('div');
    guide.id = guideId;
    guide.className = 'ed-align-guide-y';
    const line = document.createElement('div'); line.className = 'ed-align-guide-line'; guide.appendChild(line);
    const label = document.createElement('div'); label.className = 'ed-align-guide-label'; guide.appendChild(label);
    wr.appendChild(guide);
    guide.addEventListener('mousedown', ev => {
      ev.preventDefault(); ev.stopPropagation();
      const startY = ev.clientY, startPos = edAxisYPos;
      const move = mv => {
        edAxisYPos = Math.max(0, Math.min(98, startPos + (mv.clientY - startY) / (edImgNH * edZoom) * 100));
        edUpdateAlignGuide();
        // 가이드 위치만 갱신 (기존 박스는 움직이지 않음)
      };
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    });
  }
  guide.classList.add('visible');
  guide.style.top = yPos + '%';
  guide.querySelector('.ed-align-guide-label').textContent = labelText;
}

// ── 건물 목록 채우기 ──
function edPopulateBuildings(rows) {
  const bCol = sheetHeaders.find(h => h === '건물명' || h === '상가명') || '';
  const names = [...new Set(rows.map(r => (r[bCol]||'').trim()).filter(Boolean))].sort();
  const sel = document.getElementById('edBuildingSelect');
  sel.innerHTML = '<option value="">-- 건물을 선택하세요 --</option>' + names.map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');
}

// ── 건물 선택 → 해당 건물 호실 로드 ──
function edLoadBuilding() {
  const bName = document.getElementById('edBuildingSelect').value;
  if (!bName) { showToast('건물을 선택하세요'); return; }
  const bCol = sheetHeaders.find(h => h === '건물명' || h === '상가명') || '';
  const filtered = rawSheetRows.filter(r => (r[bCol]||'').trim() === bName);
  if (!filtered.length) { showToast('해당 건물 데이터 없음'); return; }

  const hoCol = sheetHeaders.find(h => h === '호') || '';
  const nameCol = sheetHeaders.find(h => h === '현재상호' || h === '상호') || '';
  const dongCol = sheetHeaders.find(h => h === '동') || '';
  const grpCol = sheetHeaders.find(h => h === '그룹') || '';

  edUnits = filtered.map(r => ({
    상가명: (r[bCol]||'').trim(),
    동: (r[dongCol]||'').trim(),
    호수: String(r[hoCol]||'').trim(),
    상호명: (r[nameCol]||'').trim(),
    그룹: (r[grpCol]||'').trim()
  })).filter(u => u.호수);

  edActiveDong = '전체';
  edBoxes = {};
  edGroupNameVal = '';
  edFilteredUnits = [];

  // 시트 '그룹' 열 기반 그룹 탭 생성
  edRenderSheetGroupTabs(bName);
  // 저장된 그룹 탭도 렌더
  edRenderGroupTabs(bName);

  // 첫 번째 시트 그룹 자동 선택
  const sheetGroups = [...new Set(edUnits.map(u => u.그룹).filter(Boolean))];
  if (sheetGroups.length > 0) {
    edSelectSheetGroup(bName, sheetGroups[0]);
  } else {
    // 그룹 열 없으면 전체 표시
    edFilteredUnits = [];
    const fpGroups = floorplans[bName];
    if (fpGroups && typeof fpGroups === 'object') {
      const firstGroup = Object.keys(fpGroups)[0];
      if (firstGroup) edLoadGroup(bName, firstGroup);
      else showToast(`✅ ${bName} — ${edUnits.length}개 호실 (그룹 열 없음)`);
    } else {
      showToast(`✅ ${bName} — ${edUnits.length}개 호실 (그룹 열 없음)`);
    }
  }

  edSelectedUnit = null;
  edRenderDongTabs();
  edRenderUnitList();
}

// ── 그룹 탭 렌더 (편집기 사이드바) ──
function edRenderGroupTabs(bName) {
  let container = document.getElementById('edGroupTabs');
  if (!container) {
    // 그룹 탭 컨테이너 생성 (그룹명 입력란 앞에 삽입)
    container = document.createElement('div');
    container.id = 'edGroupTabs';
    container.className = 'ed-dong-tabs';
    container.style.borderBottom = '1px solid var(--line)';
    const cfg = document.getElementById('edGroupCfg');
    cfg.parentElement.insertBefore(container, cfg);
  }
  container.innerHTML = '';
  const fpGroups = floorplans[bName];
  if (!fpGroups || typeof fpGroups !== 'object') { container.style.display='none'; return; }
  const groupNames = Object.keys(fpGroups);
  if (groupNames.length === 0) { container.style.display='none'; return; }
  container.style.display = '';

  groupNames.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'ed-dong-tab' + (g === edGroupNameVal ? ' active' : '');
    btn.textContent = '📷 ' + g;
    btn.style.fontSize = '10px';
    btn.title = '저장된 평면도 — 클릭하여 로드';
    btn.addEventListener('click', () => {
      edFilteredUnits = edUnits.filter(u => u.그룹 === g);
      edLoadGroup(bName, g);
      edRenderSheetGroupTabs(bName);
    });
    container.appendChild(btn);
  });
}

// 특정 그룹 로드 (이미지 + 박스 복원)
function edLoadGroup(bName, gName) {
  const fpGroups = floorplans[bName];
  if (!fpGroups || !fpGroups[gName]) return;
  const saved = fpGroups[gName];

  edGroupNameVal = gName;

  // 시트 그룹 열 기반 필터 복원
  edFilteredUnits = edUnits.filter(u => u.그룹 === gName);

  // 박스 복원 (복합키 + 하위호환)
  const uMapByKey = Object.fromEntries(edUnits.map(u=>[edBoxKey(u),u]));
  const uMapByHosu = Object.fromEntries(edUnits.map(u=>[u.호수,u]));
  edBoxes = {};
  if (saved.boxes) {
    for (const [key,b] of Object.entries(saved.boxes)) {
      // 새 형식(동_호수) 또는 구 형식(호수만) 모두 지원
      let unit = uMapByKey[key];
      if (!unit && b.dong && b.hosu) unit = uMapByKey[edBoxKey({동:b.dong,호수:b.hosu})];
      if (!unit) unit = uMapByHosu[key]; // 구 형식 fallback
      if (unit) edBoxes[edBoxKey(unit)]={...b,unit};
    }
  }

  // 이미지 복원
  if (saved.imgDataURL) {
    edImageURL = saved.imgDataURL;
    document.getElementById('edDropzone').classList.add('has-file');
    document.getElementById('edCanvasScroller').style.display = '';
    document.getElementById('edZoomBar').style.display = '';
    const img = document.getElementById('ed-floorplan-img');
    img.src = saved.imgDataURL;
    img.onload = () => {
      edImgNW = img.naturalWidth; edImgNH = img.naturalHeight;
      edApplyZoom(); edRenderAllBoxes(); edUpdateAlignGuide();
    };
    document.getElementById('edCanvasWrapper').removeEventListener('click', edOnCanvasClick);
    document.getElementById('edCanvasWrapper').addEventListener('click', edOnCanvasClick);
  }

  edActiveDong = '전체';
  edRenderGroupTabs(bName);
  edRenderDongTabs();
  edRenderUnitList();
  showToast(`✅ "${gName}" 그룹 로드 (${Object.keys(edBoxes).length}개 박스)`);
}

// 전체지도 카드에서 건물명으로 직접 로드
function edLoadBuildingByName(bName) {
  const sel = document.getElementById('edBuildingSelect');
  sel.value = bName;
  edLoadBuilding();
}

// ── 크롭 기능 ──
function edStartCrop() {
  if (!edImageURL) { showToast('먼저 평면도 이미지를 업로드하세요'); return; }
  const wrap = document.getElementById('edCanvasWrapper');
  if (wrap.querySelector('.crop-overlay')) return;

  const overlay = document.createElement('div'); overlay.className = 'crop-overlay';

  // 초기 크롭 박스: 이미지의 80% 중앙
  const cx = 10, cy = 10, cw = 80, ch = 80;
  const box = document.createElement('div'); box.className = 'crop-box';
  box.style.left = cx + '%'; box.style.top = cy + '%';
  box.style.width = cw + '%'; box.style.height = ch + '%';
  ['tl','tr','bl','br'].forEach(pos => {
    const h = document.createElement('div'); h.className = 'crop-handle ' + pos;
    box.appendChild(h);
  });

  const toolbar = document.createElement('div'); toolbar.className = 'crop-toolbar';
  toolbar.innerHTML = `
    <button class="crop-ok" onclick="edApplyCrop()">✓ 잘라내기 + 여백 추가</button>
    <button class="crop-cancel" onclick="edCancelCrop()">취소</button>
  `;

  overlay.appendChild(box);
  overlay.appendChild(toolbar);
  wrap.appendChild(overlay);

  // 박스 드래그 (이동)
  box.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('crop-handle')) return;
    e.preventDefault(); e.stopPropagation();
    const rect = wrap.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const ol = parseFloat(box.style.left), ot = parseFloat(box.style.top);
    const ww = rect.width, wh = rect.height;
    function mv(ev) {
      const dx = (ev.clientX - sx) / ww * 100;
      const dy = (ev.clientY - sy) / wh * 100;
      const bw = parseFloat(box.style.width), bh = parseFloat(box.style.height);
      box.style.left = Math.max(0, Math.min(100 - bw, ol + dx)) + '%';
      box.style.top  = Math.max(0, Math.min(100 - bh, ot + dy)) + '%';
    }
    function up() { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); }
    document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
  });

  // 핸들 리사이즈
  box.querySelectorAll('.crop-handle').forEach(h => {
    h.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const pos = h.className.split(' ').pop();
      const rect = wrap.getBoundingClientRect();
      const sx = e.clientX, sy = e.clientY;
      const ol = parseFloat(box.style.left), ot = parseFloat(box.style.top);
      const ow = parseFloat(box.style.width), oh = parseFloat(box.style.height);
      const ww = rect.width, wh = rect.height;
      function mv(ev) {
        const dx = (ev.clientX - sx) / ww * 100;
        const dy = (ev.clientY - sy) / wh * 100;
        let nl = ol, nt = ot, nw = ow, nh = oh;
        if (pos === 'tl') { nl = ol + dx; nt = ot + dy; nw = ow - dx; nh = oh - dy; }
        else if (pos === 'tr') { nt = ot + dy; nw = ow + dx; nh = oh - dy; }
        else if (pos === 'bl') { nl = ol + dx; nw = ow - dx; nh = oh + dy; }
        else if (pos === 'br') { nw = ow + dx; nh = oh + dy; }
        if (nw < 5 || nh < 5) return;
        if (nl < 0) { nw += nl; nl = 0; }
        if (nt < 0) { nh += nt; nt = 0; }
        if (nl + nw > 100) nw = 100 - nl;
        if (nt + nh > 100) nh = 100 - nt;
        box.style.left = nl + '%'; box.style.top = nt + '%';
        box.style.width = nw + '%'; box.style.height = nh + '%';
      }
      function up() { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); }
      document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
    });
  });
}

function edCancelCrop() {
  const ov = document.querySelector('#edCanvasWrapper .crop-overlay');
  if (ov) ov.remove();
}

function edApplyCrop() {
  const wrap = document.getElementById('edCanvasWrapper');
  const box = wrap.querySelector('.crop-box');
  if (!box) return;
  const cl = parseFloat(box.style.left) / 100;
  const ct = parseFloat(box.style.top) / 100;
  const cw = parseFloat(box.style.width) / 100;
  const ch = parseFloat(box.style.height) / 100;

  const img = document.getElementById('ed-floorplan-img');
  const srcW = img.naturalWidth, srcH = img.naturalHeight;
  const sx = Math.round(cl * srcW), sy = Math.round(ct * srcH);
  const sw = Math.round(cw * srcW), sh = Math.round(ch * srcH);

  // 여백: 텍스트박스 기본 폭 135px + 여유 → 양쪽 각 150px 이상 확보
  const padX = 160, padY = 60;
  const outW = sw + padX * 2, outH = sh + padY * 2;

  const cvs = document.createElement('canvas');
  cvs.width = outW; cvs.height = outH;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, outW, outH);
  ctx.drawImage(img, sx, sy, sw, sh, padX, padY, sw, sh);

  // 배치된 박스 좌표(%)를 새 캔버스 기준으로 재계산
  for (const key of Object.keys(edBoxes)) {
    const b = edBoxes[key];
    const absX = b.x / 100 * srcW;
    const absY = b.y / 100 * srcH;
    const absW = b.w / 100 * srcW;
    const absH = b.h / 100 * srcH;
    const newAbsX = absX - sx + padX;
    const newAbsY = absY - sy + padY;
    b.x = newAbsX / outW * 100;
    b.y = newAbsY / outH * 100;
    b.w = absW / outW * 100;
    b.h = absH / outH * 100;
  }

  const supportsWebP = cvs.toDataURL('image/webp').startsWith('data:image/webp');
  const dataURL = supportsWebP ? cvs.toDataURL('image/webp', 0.95) : cvs.toDataURL('image/png');

  // 이미지 교체 — File 객체 제거(재업로드와 호환되도록 input 초기화)
  const input = document.getElementById('edImgInput');
  if (input) input.value = '';
  edImageURL = dataURL;
  img.src = dataURL;
  img.onload = () => {
    edImgNW = img.naturalWidth; edImgNH = img.naturalHeight;
    edApplyZoom(); edRenderAllBoxes(); edUpdateAlignGuide();
  };

  edCancelCrop();
  showToast(`✂️ 크롭 완료 — ${outW}×${outH}px, 여백 ${padX}×${padY}px 추가`);
}

// ── 동 탭 ──
function edGetBaseUnits() {
  return edFilteredUnits.length > 0 ? edFilteredUnits : edUnits;
}

function edRenderDongTabs() {
  const base = edGetBaseUnits();
  const ds = ['전체', ...new Set(base.map(u=>u.동).filter(Boolean))];
  const c = document.getElementById('edDongTabs'); c.innerHTML = '';
  ds.forEach(d => { const b=document.createElement('button'); b.className='ed-dong-tab'+(d===edActiveDong?' active':''); b.textContent=d||'(동 없음)'; b.addEventListener('click',()=>{edActiveDong=d;edRenderDongTabs();edRenderUnitList();}); c.appendChild(b); });
}

// ── 호실 목록 ──
function edRenderUnitList() {
  const list = document.getElementById('edUnitList');
  const q = (document.getElementById('edUnitSearch').value||'').trim().toLowerCase();
  list.innerHTML = '';
  const base = edGetBaseUnits();
  let fr = edActiveDong === '전체' ? base : base.filter(u=>u.동===edActiveDong);
  if (q) fr = fr.filter(u=>u.호수.toLowerCase().includes(q)||u.상호명.toLowerCase().includes(q));
  fr.forEach(u => {
    const placed = !!edBoxes[edBoxKey(u)], isSel = edSelectedUnit?.호수===u.호수 && edSelectedUnit?.동===u.동;
    const row = document.createElement('div');
    row.className = 'ed-unit-row'+(placed?' placed':'')+(isSel?' active':'');
    row.innerHTML = `<div class="ed-unit-ind"></div><div style="flex:1;min-width:0"><div class="ed-unit-hosu">${u.호수}</div><div class="ed-unit-name">${u.상호명||'(상호 없음)'}</div>${u.동?`<div class="ed-unit-meta">${u.동}</div>`:''}</div>`;
    row.addEventListener('click', () => edSelectUnit(u));
    list.appendChild(row);
  });
  const baseLen = edGetBaseUnits().length;
  document.getElementById('edPlacedPill').textContent = `${Object.keys(edBoxes).length} / ${baseLen}`;
}

function edSelectUnit(u) {
  edSelectedUnit = u; edRenderUnitList();
  // 선택된 호실이 목록에서 보이도록 자동 스크롤
  requestAnimationFrame(() => {
    const list = document.getElementById('edUnitList');
    const activeRow = list.querySelector('.ed-unit-row.active');
    if (activeRow) activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
  const h = document.getElementById('edPlacingHint');
  h.textContent = `📍 "${u.호수} ${u.상호명}" — 평면도에서 위치 클릭`;
  h.classList.add('visible');
  setTimeout(()=>h.classList.remove('visible'), 3500);
}

// ── 회전 보정: 시각적 바운딩 박스 반크기 계산 ──
// CSS rotate는 중심 기준 회전 → 시각적 위치와 CSS left/top이 달라짐
function getVisualHalf(boxW, boxH, rotDeg) {
  if (!rotDeg) return { hw: boxW / 2, hh: boxH / 2 };
  const rad = Math.abs(rotDeg % 360) * Math.PI / 180;
  return {
    hw: (boxW * Math.abs(Math.cos(rad)) + boxH * Math.abs(Math.sin(rad))) / 2,
    hh: (boxW * Math.abs(Math.sin(rad)) + boxH * Math.abs(Math.cos(rad))) / 2
  };
}

// ── 캔버스 클릭 → 박스 배치 ──
function edOnCanvasClick(e) {
  if (!edSelectedUnit) return;
  if (e.target.closest('.obox') || e.target.closest('.ed-align-guide')) return;
  const wr = document.getElementById('edCanvasWrapper').getBoundingClientRect();
  const px = (e.clientX - wr.left) / edZoom, py = (e.clientY - wr.top) / edZoom;
  const boxW = (135 / edImgNW) * 100, boxH = (34 / edImgNH) * 100;

  let rot = 0;
  if (edBoxMode && edBoxModeRotSet) rot = edBoxModeRot;

  // 회전 보정값 계산
  const vis = getVisualHalf(boxW, boxH, rot);
  // 클릭 위치 → 시각적 좌상단이 커서에 오도록 보정
  let bx = (px / edImgNW) * 100 + vis.hw - boxW / 2;
  let by = (py / edImgNH) * 100 + vis.hh - boxH / 2;

  // 상자 설정 모드: 축 정렬 (회전 보정 적용)
  if (edBoxMode) {
    if (edAxisXOn) {
      // 좌측: 시각적 왼쪽 모서리를 축에 맞춤 / 우측: 시각적 오른쪽 모서리를 축에 맞춤
      bx = edAxisXAnchor === 'left'
        ? edAxisXPos + vis.hw - boxW / 2
        : edAxisXPos - vis.hw - boxW / 2;
    }
    if (edAxisYOn) {
      // 상단: 시각적 하단을 축에 맞춤(박스가 선 위) / 하단: 시각적 상단을 축에 맞춤(박스가 선 아래)
      by = edAxisYAnchor === 'top'
        ? edAxisYPos - vis.hh - boxH / 2
        : edAxisYPos + vis.hh - boxH / 2;
    }
  }

  bx = Math.max(0, Math.min(98 - boxW, bx));
  by = Math.max(0, Math.min(98 - boxH, by));

  const tAlign = edBoxMode ? edTextAlign : 'left';
  const bKey = edBoxKey(edSelectedUnit);
  edBoxes[bKey] = { x: bx, y: by, w: boxW, h: boxH, rot: rot, name: edSelectedUnit.상호명, textAlign: tAlign, unit: edSelectedUnit };

  edRenderAllBoxes(); edRenderUnitList();
  const base = edGetBaseUnits();
  const all = edActiveDong === '전체' ? base : base.filter(u => u.동 === edActiveDong);
  const idx = all.findIndex(u => edBoxKey(u) === bKey);
  const next = all.slice(idx + 1).find(u => !edBoxes[edBoxKey(u)]);
  if (next) edSelectUnit(next); else { edSelectedUnit = null; edRenderUnitList(); }
}

// ── 박스 렌더 ──
function edRenderAllBoxes() {
  const wr = document.getElementById('edCanvasWrapper');
  wr.querySelectorAll('.obox').forEach(el=>el.remove());
  for (const [bkey,b] of Object.entries(edBoxes)) {
    const el = document.createElement('div');
    const selKey = edSelectedUnit ? edBoxKey(edSelectedUnit) : '';
    el.className = 'obox'+(selKey===bkey?' obox-selected':'');
    el.dataset.bkey = bkey;
    el.style.left=b.x+'%'; el.style.top=b.y+'%'; el.style.width=b.w+'%'; el.style.height=b.h+'%';
    if (b.rot) el.style.transform = `rotate(${b.rot}deg)`;
    const ta = b.textAlign || 'left';
    const rotDeg = b.rot || 0;
    const displayName = b.unit?.상호명 || b.name || b.unit?.호수 || bkey;
    el.innerHTML = `<div class="obox-hosu">${b.unit?.호수||bkey}</div><div class="obox-name" style="text-align:${ta}">${displayName}</div><div class="obox-del">✕</div><div class="obox-rotate-label">${rotDeg}°</div><div class="obox-rotate" title="드래그하여 회전">↻</div><div class="obox-resize"></div>`;
    el.querySelector('.obox-del').addEventListener('click',ev=>{ev.stopPropagation();delete edBoxes[bkey];edRenderAllBoxes();edRenderUnitList();});
    el.querySelector('.obox-rotate').addEventListener('mousedown',edStartRotate);
    el.addEventListener('mousedown',edStartDrag);
    el.querySelector('.obox-resize').addEventListener('mousedown',edStartResize);
    wr.appendChild(el);
  }
}

function edStartDrag(e) {
  if(e.target.classList.contains('obox-resize')||e.target.classList.contains('obox-del')||e.target.classList.contains('obox-rotate'))return;
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget,bkey=el.dataset.bkey,b=edBoxes[bkey];
  const sd={bkey,el,sx:e.clientX,sy:e.clientY,ox:b.x,oy:b.y};
  const move=ev=>{
    const dx=(ev.clientX-sd.sx)/(edImgNW*edZoom)*100,dy=(ev.clientY-sd.sy)/(edImgNH*edZoom)*100;
    let nx=Math.max(0,Math.min(95,sd.ox+dx)), ny=Math.max(0,Math.min(95,sd.oy+dy));
    if(edBoxMode && edAxisXOn){
      const vis = getVisualHalf(b.w, b.h, b.rot);
      nx = edAxisXAnchor==='left' ? edAxisXPos + vis.hw - b.w/2 : edAxisXPos - vis.hw - b.w/2;
    }
    if(edBoxMode && edAxisYOn){
      const vis = getVisualHalf(b.w, b.h, b.rot);
      ny = edAxisYAnchor==='top' ? edAxisYPos - vis.hh - b.h/2 : edAxisYPos + vis.hh - b.h/2;
    }
    edBoxes[sd.bkey].x=nx;edBoxes[sd.bkey].y=ny;
    sd.el.style.left=nx+'%';sd.el.style.top=ny+'%';
  };
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}
function edStartResize(e) {
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget.parentElement,bkey=el.dataset.bkey,b=edBoxes[bkey];
  const sd={bkey,el,sx:e.clientX,sy:e.clientY,ow:b.w,oh:b.h};
  const move=ev=>{const dw=(ev.clientX-sd.sx)/(edImgNW*edZoom)*100,dh=(ev.clientY-sd.sy)/(edImgNH*edZoom)*100;edBoxes[sd.bkey].w=Math.max(2,sd.ow+dw);edBoxes[sd.bkey].h=Math.max(1.5,sd.oh+dh);sd.el.style.width=edBoxes[sd.bkey].w+'%';sd.el.style.height=edBoxes[sd.bkey].h+'%';};
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}

function edStartRotate(e) {
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget.parentElement,bkey=el.dataset.bkey,b=edBoxes[bkey];
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;
  const startRot=b.rot||0;
  const move=ev=>{
    const angle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI;
    let newRot=startRot+(angle-startAngle);
    newRot=Math.round(newRot/5)*5;
    edBoxes[bkey].rot=newRot;
    el.style.transform=`rotate(${newRot}deg)`;
    // 각도 라벨 실시간 업데이트
    const rl=el.querySelector('.obox-rotate-label');if(rl)rl.textContent=newRot+'°';
    // 상자 설정 모드: 이 각도를 기준 각도로 저장 (이후 새 박스에만 적용)
    if(edBoxMode){
      edBoxModeRot=newRot; edBoxModeRotSet=true;
      edUpdateAxisUI();
    }
  };
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}

function edChangeZoom(d){edZoom=Math.max(.2,Math.min(5,edZoom+d));edApplyZoom();}
function edApplyZoom(){const img=document.getElementById('ed-floorplan-img');img.style.width=(edImgNW*edZoom)+'px';img.style.height=(edImgNH*edZoom)+'px';document.getElementById('edZoomVal').textContent=Math.round(edZoom*100)+'%';}

// 지도에 저장 — 그룹명별 저장
function edSaveToMap(){
  const bName = document.getElementById('edBuildingSelect').value;
  if(!bName){showToast('건물을 먼저 선택하세요');return;}
  if(!Object.keys(edBoxes).length){showToast('배치된 호수가 없습니다');return;}
  if(!edImageURL){showToast('평면도 이미지를 업로드하세요');return;}
  if(!edGroupNameVal){showToast('그룹(층) 이름을 먼저 지정하세요');return;}

  const gName = edGroupNameVal;
  const boxData = Object.fromEntries(Object.entries(edBoxes).map(([k,v])=>[k,{x:v.x,y:v.y,w:v.w,h:v.h,rot:v.rot||0,name:v.unit?.상호명||'',textAlign:v.textAlign||'left',dong:v.unit?.동||'',hosu:v.unit?.호수||k}]));

  const edInput = document.getElementById('edImgInput');
  const file = edInput?.files?.[0];

  function doSave(imgDataURL) {
    if (!floorplans[bName]) floorplans[bName] = {};
    floorplans[bName][gName] = {
      boxes: boxData,
      groupName: gName,
      imgDataURL,
      savedAt: new Date().toISOString()
    };
    try {
      localStorage.setItem(FLOORPLAN_KEY, JSON.stringify(floorplans));
      showToast(`✅ '${bName}/${gName}' 평면도 저장 완료`);
      const cid = 'card_'+btoa(encodeURIComponent(bName)).replace(/[^a-zA-Z0-9]/g,'_');
      rebuildCard(cid, bName);
      edRenderGroupTabs(bName);
    } catch(e) {
      tryCompressedSave(imgDataURL, bName, boxData);
    }
    // 클라우드에도 비동기 저장
    cloudSaveAll();
  }

  if (file) {
    // 원본 파일이 있으면 FileReader로 직접 읽기 (화질 손실 없음)
    const reader = new FileReader();
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(file);
  } else {
    // 파일이 없으면 (reloaded from blob) canvas로 저장
    const img = document.getElementById('ed-floorplan-img');
    const cvs = document.createElement('canvas');
    cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
    cvs.getContext('2d').drawImage(img, 0, 0);
    // WebP 지원시 WebP(무손실에 가까운), 미지원시 PNG
    const supportsWebP = cvs.toDataURL('image/webp').startsWith('data:image/webp');
    doSave(supportsWebP ? cvs.toDataURL('image/webp', 0.95) : cvs.toDataURL('image/png'));
  }
}

function tryCompressedSave(originalURL, bName, boxData) {
  const img2 = new Image();
  img2.onload = () => {
    const steps = [
      { max: 2400, q: 0.90 },
      { max: 1800, q: 0.85 },
      { max: 1200, q: 0.80 },
      { max: 800,  q: 0.72 },
    ];
    for (const {max, q} of steps) {
      const sc = Math.min(1, max/img2.naturalWidth, max/img2.naturalHeight);
      const c = document.createElement('canvas');
      c.width = Math.round(img2.naturalWidth*sc); c.height = Math.round(img2.naturalHeight*sc);
      c.getContext('2d').drawImage(img2, 0, 0, c.width, c.height);
      const url = c.toDataURL('image/jpeg', q);
      if (!floorplans[bName]) floorplans[bName] = {};
      floorplans[bName][edGroupNameVal||'1층'] = { boxes:boxData, groupName:edGroupNameVal||'1층', imgDataURL:url, savedAt:new Date().toISOString() };
      try { localStorage.setItem(FLOORPLAN_KEY, JSON.stringify(floorplans)); showToast(`\u2705 \uc800\uc7a5 \uc644\ub8cc (${Math.round(sc*100)}% \ud06c\uae30)`); const cid='card_'+btoa(encodeURIComponent(bName)).replace(/[^a-zA-Z0-9]/g,'_'); rebuildCard(cid,bName); return; } catch(e){}
    }
    showToast('\u274c \uc800\uc7a5 \uc2e4\ud328 (\uc0ac\uc6a9 \uac00\ub2a5\ud55c \uacf5\uac04 \ubd80\uc871)');
  };
  img2.src = originalURL;
}

// ── Export Image ──
function edExportImg() {
  if (!edImageURL) { showToast('이미지를 먼저 업로드하세요'); return; }
  const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
  const img = new Image(); img.crossOrigin='anonymous';
  img.onload = () => {
    cvs.width=img.naturalWidth; cvs.height=img.naturalHeight;
    ctx.drawImage(img,0,0);
    for(const[bkey,b]of Object.entries(edBoxes)){
      const x=b.x/100*cvs.width,y=b.y/100*cvs.height,w=b.w/100*cvs.width,h=b.h/100*cvs.height;
      ctx.save();
      if(b.rot){ctx.translate(x+w/2,y+h/2);ctx.rotate(b.rot*Math.PI/180);ctx.translate(-(x+w/2),-(y+h/2));}
      ctx.fillStyle='rgba(37,99,235,.15)';ctx.strokeStyle='#2563eb';ctx.lineWidth=Math.max(1.5,cvs.width/800);
      ctx.beginPath();ctx.rect(x,y,w,h);ctx.fill();ctx.stroke();
      const fs=Math.max(10,h*.42);
      ctx.fillStyle='#1a1c2a';ctx.font=`700 ${fs}px "Noto Sans KR",sans-serif`;ctx.save();ctx.beginPath();ctx.rect(x+2,y,w-4,h);ctx.clip();ctx.fillText(b.unit?.상호명||b.unit?.호수||bkey,x+3,y+h*0.5+fs*0.35);ctx.restore();
      ctx.restore();
    }
    const a=document.createElement('a');a.download='평면도_상호명.png';a.href=cvs.toDataURL('image/png');a.click();showToast('✅ 이미지 저장 완료');
  };
  img.src=edImageURL;
}

function edSaveLayout() {

}
function edLoadLayout(input) {
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{
    const data=JSON.parse(e.target.result);if(!data.boxes)throw new Error('유효하지 않은 파일');
    if(data.units&&edUnits.length===0)edUnits=data.units;
    const uMapByKey=Object.fromEntries(edUnits.map(u=>[edBoxKey(u),u]));
    const uMapByHosu=Object.fromEntries(edUnits.map(u=>[u.호수,u]));
    edBoxes={};for(const[key,b]of Object.entries(data.boxes)){
      let unit=uMapByKey[key];
      if(!unit&&b.dong&&b.hosu)unit=uMapByKey[edBoxKey({동:b.dong,호수:b.hosu})];
      if(!unit)unit=uMapByHosu[key];
      if(!unit&&data.units)unit=data.units.find(u=>u.호수===(b.hosu||key));
      if(unit)edBoxes[edBoxKey(unit)]={...b,unit};
    }
    edRenderAllBoxes();edRenderUnitList();showToast(`✅ 레이아웃 복원 완료 (${Object.keys(edBoxes).length}개)`);
  }catch(err){showToast('❌ '+err.message);}input.value='';};
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════
// MAP BACKGROUND — OSM TILES
// ═══════════════════════════════════════════════
let mapBgOn = false;
let mapScale = 1.0;
let mapShiftX = 0, mapShiftY = 0;
let mapOpacity = 0.55;

function toggleMapBg() {
  mapBgOn = !mapBgOn;
  const btn = document.getElementById('mapBgBtn');
  btn.classList.toggle('on', mapBgOn);
  btn.textContent = mapBgOn ? '지도 숨김' : '🗺️ 지도';
  const canvas = document.getElementById('canvas');
  const ctrl = document.getElementById('mapBgControls');
  if (mapBgOn) {
    loadMapTiles();
    canvas.classList.add('map-bg-on');
    ctrl.classList.add('visible');
  } else {
    const c = document.getElementById('mapTileContainer');
    if (c) c.style.display = 'none';
    canvas.classList.remove('map-bg-on');
    ctrl.classList.remove('visible');
  }
}

function adjustMapBg(action) {
  const step = 150 / mapScale; // 이동량은 현재 스케일에 반비례
  switch(action) {
    case 'zoomIn':  mapScale = Math.min(6, mapScale * 1.35); break;
    case 'zoomOut': mapScale = Math.max(0.3, mapScale / 1.35); break;
    case 'up':    mapShiftY -= step; break;
    case 'down':  mapShiftY += step; break;
    case 'left':  mapShiftX -= step; break;
    case 'right': mapShiftX += step; break;
    case 'reset': mapScale = 1.0; mapShiftX = 0; mapShiftY = 0; break;
  }
  applyMapTransform();
}

function adjustMapOpacity(val) {
  mapOpacity = parseInt(val) / 100;
  const c = document.getElementById('mapTileContainer');
  if (c) c.style.opacity = mapOpacity;
}

function applyMapTransform() {
  const c = document.getElementById('mapTileContainer');
  if (!c) return;
  c.style.transformOrigin = '1500px 1500px';
  c.style.transform = `translate(${mapShiftX}px, ${mapShiftY}px) scale(${mapScale})`;
  document.getElementById('mapScaleVal').textContent = Math.round(mapScale * 100) + '%';
}

function loadMapTiles() {
  const canvas = document.getElementById('canvas');
  let container = document.getElementById('mapTileContainer');
  if (container) { container.style.display = ''; applyMapTransform(); return; } // 이미 로드됨

  container = document.createElement('div');
  container.id = 'mapTileContainer';
  container.style.cssText = 'position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0.55;';
  canvas.insertBefore(container, canvas.firstChild);

  // 위례 신도시 중심 좌표
  const lat = 37.4767026, lng = 127.1420792;
  const z = 17, tileSize = 256;
  const n = Math.pow(2, z);

  // 위경도 → 타일 좌표
  const centerTX = (lng + 180) / 360 * n;
  const latRad = lat * Math.PI / 180;
  const centerTY = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;

  const canvasW = 3000, canvasH = 3000;
  const tilesX = Math.ceil(canvasW / tileSize) + 1; // ~13
  const tilesY = Math.ceil(canvasH / tileSize) + 1;

  const startTX = Math.floor(centerTX - tilesX / 2);
  const startTY = Math.floor(centerTY - tilesY / 2);

  const offsetX = canvasW / 2 - (centerTX - startTX) * tileSize;
  const offsetY = canvasH / 2 - (centerTY - startTY) * tileSize;

  const subdomains = ['a', 'b', 'c'];
  for (let dy = 0; dy < tilesY; dy++) {
    for (let dx = 0; dx < tilesX; dx++) {
      const tx = startTX + dx, ty = startTY + dy;
      const s = subdomains[(dx + dy) % 3];
      const img = document.createElement('img');
      img.className = 'map-tile';
      img.src = `https://${s}.tile.openstreetmap.org/${z}/${tx}/${ty}.png`;
      img.style.left = Math.round(offsetX + dx * tileSize) + 'px';
      img.style.top = Math.round(offsetY + dy * tileSize) + 'px';
      img.style.width = tileSize + 'px';
      img.style.height = tileSize + 'px';
      img.draggable = false;
      img.loading = 'lazy';
      container.appendChild(img);
    }
  }
  // OSM 저작자 표시
  const attr = document.createElement('div');
  attr.style.cssText = 'position:absolute;bottom:4px;right:4px;font-size:9px;color:#666;background:rgba(255,255,255,.7);padding:1px 4px;border-radius:3px;pointer-events:auto;';
  attr.innerHTML = '© <a href="https://www.openstreetmap.org/copyright" target="_blank" style="color:#0078A8">OpenStreetMap</a>';
  container.appendChild(attr);
  applyMapTransform();
}

// ═══════════════════════════════════════════════
// CLOUD SYNC (Supabase Storage)
// ═══════════════════════════════════════════════

function safeName(str) {
  return encodeURIComponent(str).replace(/%/g, '_');
}

function dataURLtoBlob(dataURL) {
  const [header, b64] = dataURL.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function updateSyncStatus(msg, isError) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--red)' : 'var(--text2)';
  if (!isError) setTimeout(() => { el.textContent = ''; }, 4000);
}

async function cloudSaveAll() {
  const supabase = getSupabase();
  if (!supabase) { updateSyncStatus('Supabase 미연결', true); return; }
  updateSyncStatus('☁️ 업로드 중...');

  try {
    // 1) 이미지 분리 + boxes 데이터 준비
    const dataOnly = {};
    const imgUploads = [];

    for (const [bName, groups] of Object.entries(floorplans)) {
      dataOnly[bName] = {};
      for (const [gName, gData] of Object.entries(groups)) {
        const { imgDataURL, ...rest } = gData;
        dataOnly[bName][gName] = rest;

        if (imgDataURL && imgDataURL.startsWith('data:')) {
          const path = `img/${safeName(bName)}_${safeName(gName)}`;
          const blob = dataURLtoBlob(imgDataURL);
          imgUploads.push(
            supabase.storage.from(SUPABASE_BUCKET)
              .upload(path, blob, { upsert: true, contentType: blob.type })
              .then(res => {
                if (res.error) console.warn('img upload err:', path, res.error.message);
              })
          );
        }
      }
    }

    // 2) JSON 메타데이터 업로드
    const dataBlob = new Blob([JSON.stringify(dataOnly)], { type: 'application/json' });
    const posBlob = new Blob([JSON.stringify(positions)], { type: 'application/json' });

    await Promise.all([
      ...imgUploads,
      supabase.storage.from(SUPABASE_BUCKET)
        .upload('_data.json', dataBlob, { upsert: true, contentType: 'application/json' }),
      supabase.storage.from(SUPABASE_BUCKET)
        .upload('_positions.json', posBlob, { upsert: true, contentType: 'application/json' })
    ]);

    updateSyncStatus('☁️ 저장 완료');
    showToast('☁️ 클라우드 저장 완료');
  } catch (e) {
    console.error('cloudSaveAll error:', e);
    updateSyncStatus('☁️ 저장 실패', true);
    showToast('☁️ 클라우드 저장 실패: ' + e.message);
  }
}

async function cloudLoadAll() {
  const supabase = getSupabase();
  if (!supabase) return false;
  updateSyncStatus('☁️ 다운로드 중...');

  try {
    // 1) _data.json 다운로드
    const { data: dataFile, error: dataErr } = await supabase.storage
      .from(SUPABASE_BUCKET).download('_data.json');
    if (dataErr || !dataFile) { updateSyncStatus(''); return false; }

    const cloudData = JSON.parse(await dataFile.text());

    // 2) _positions.json 다운로드
    const { data: posFile } = await supabase.storage
      .from(SUPABASE_BUCKET).download('_positions.json');
    if (posFile) {
      const cloudPos = JSON.parse(await posFile.text());
      if (Object.keys(cloudPos).length > 0) positions = cloudPos;
    }

    // 3) 이미지 URL 복원 (Supabase public URL 사용)
    for (const [bName, groups] of Object.entries(cloudData)) {
      if (!floorplans[bName]) floorplans[bName] = {};
      for (const [gName, gData] of Object.entries(groups)) {
        const localData = floorplans[bName]?.[gName];
        const localTime = localData?.savedAt || '';
        const cloudTime = gData.savedAt || '';

        // 클라우드가 더 최신이거나 로컬에 없으면 → 클라우드 데이터 사용
        if (!localData || cloudTime >= localTime) {
          const path = `img/${safeName(bName)}_${safeName(gName)}`;
          const { data: urlData } = supabase.storage
            .from(SUPABASE_BUCKET).getPublicUrl(path);
          // 이미지는 즉시 public URL 사용 (없으면 img onerror로 대체)
          const imgURL = urlData?.publicUrl || localData?.imgDataURL || '';
          floorplans[bName][gName] = { ...gData, imgDataURL: imgURL };
        }
      }
    }

    // localStorage 갱신
    try { localStorage.setItem(FLOORPLAN_KEY, JSON.stringify(floorplans)); } catch(e) {}
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); } catch(e) {}

    updateSyncStatus('☁️ 동기화 완료');
    return true;
  } catch (e) {
    console.error('cloudLoadAll error:', e);
    updateSyncStatus('☁️ 로드 실패', true);
    return false;
  }
}

async function syncFromCloud() {
  const btn = document.getElementById('syncBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 동기화...'; }
  const loaded = await cloudLoadAll();
  if (loaded) {
    renderAllCards();
    updateStats();
    showToast('☁️ 클라우드에서 동기화 완료');
  } else {
    showToast('☁️ 클라우드 데이터 없음 또는 실패');
  }
  if (btn) { btn.disabled = false; btn.textContent = '☁️ 동기화'; }
}
