<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>위례 트램라인 상가지도</title>
<meta name="description" content="위례 신도시 트램라인 상권 전체 상가 지도 - 건물별 층별 평면도 및 호실 정보">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');

:root {
  --ink:#1a1c2a; --ink2:#2d3148;
  --line:#e2e5f0; --line2:#c8cde0;
  --paper:#f0f2f8; --paper2:#ffffff;
  --blue:#2563eb; --blue-light:#dbeafe; --blue-mid:#93c5fd;
  --green:#16a34a; --green-light:#dcfce7;
  --red:#dc2626; --red-light:#fee2e2;
  --amber:#d97706; --amber-light:#fef3c7;
  --text:#1a1c2a; --text2:#6b7280; --text3:#9ca3af;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --topbar-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px;-webkit-tap-highlight-color:transparent}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--paper2);border-bottom:1.5px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:var(--shadow);z-index:200}
.topbar-logo{font-weight:900;font-size:15px;letter-spacing:-0.5px;color:var(--blue);white-space:nowrap;display:flex;align-items:center;gap:7px}
.topbar-sep{width:1px;height:24px;background:var(--line);flex-shrink:0}

/* 메인 탭 (전체지도 / 편집기) */
.main-tabs{display:flex;gap:2px;background:var(--paper);border-radius:8px;padding:2px;border:1.5px solid var(--line)}
.main-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.main-tab:hover{color:var(--blue)}
.main-tab.active{background:var(--blue);color:#fff}

.topbar-search{flex:1;max-width:260px;display:flex;align-items:center;gap:6px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:0 10px;height:34px}
.topbar-search input{border:none;background:transparent;outline:none;font-size:13px;font-family:inherit;color:var(--text);width:100%}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-actions{display:flex;gap:8px;margin-left:auto}

.btn{height:32px;padding:0 12px;border-radius:7px;border:1.5px solid var(--line);background:var(--paper2);color:var(--text);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s,border-color .15s}
.btn:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── PAGE VIEWS ── */
.page-view{flex:1;display:none;overflow:hidden;flex-direction:column}
.page-view.active{display:flex}

/* ══ MAP PAGE ══ */
.main{flex:1;display:flex;overflow:hidden;position:relative}
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;background:radial-gradient(circle,#c8cde0 1px,transparent 1px);background-size:28px 28px;background-color:var(--paper)}
.canvas-wrap.panning{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;width:3000px;height:3000px;transform-origin:0 0}

/* Building Card */
.building-card{position:absolute;width:320px;background:var(--paper2);border-radius:12px;border:1.5px solid var(--line);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s;user-select:none}
.building-card:hover{box-shadow:0 12px 40px rgba(0,0,0,.18)}
.building-card.dragging{box-shadow:0 20px 60px rgba(37,99,235,.25);border-color:var(--blue-mid);z-index:100!important}
.card-header{background:var(--blue);padding:10px 12px 8px;cursor:move;display:flex;flex-direction:column;gap:6px}
.card-title-row{display:flex;align-items:center;justify-content:space-between}
.card-building-name{font-weight:700;font-size:14px;color:#fff;letter-spacing:-.3px}
.card-room-count{font-size:11px;color:rgba(255,255,255,.7);font-weight:400}
.card-grip{width:20px;height:14px;display:flex;flex-direction:column;gap:3px;justify-content:center;opacity:.5}
.card-grip span{display:block;height:2px;background:#fff;border-radius:1px}

.section-tabs{display:flex;gap:4px;padding:8px 10px 0;background:#f8f9fe;border-bottom:1.5px solid var(--line);overflow-x:auto;flex-shrink:0}
.section-tabs::-webkit-scrollbar{height:3px}
.section-tab{padding:4px 10px 6px;font-size:11px;font-weight:500;color:var(--text2);border:1.5px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;white-space:nowrap;background:transparent;font-family:inherit;transition:color .12s,background .12s}
.section-tab:hover{color:var(--blue)}
.section-tab.active{color:var(--blue);font-weight:700;background:var(--paper2);border-color:var(--line)}

.floor-tabs{display:flex;gap:3px;padding:8px 10px 6px;background:var(--paper2);border-bottom:1.5px solid var(--line);overflow-x:auto;flex-shrink:0}
.floor-tab{padding:3px 9px;font-size:11px;font-weight:500;color:var(--text2);background:var(--paper);border:1.5px solid var(--line);border-radius:5px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .12s,color .12s}
.floor-tab:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
.floor-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700}

.room-grid-wrap{overflow-y:auto;max-height:280px;padding:8px 10px 10px}
.room-grid{display:flex;flex-wrap:wrap;gap:5px}
.room-grid .room-cell{flex:0 0 calc(25% - 4px);min-width:58px;max-width:72px}
/* 검색 매칭 셀 앞 정렬용 (order 속성은 flex에서만 동작) */
.room-grid.search-active .room-cell:not(.highlight){order:2;opacity:.42}
.room-grid.search-active .room-cell.highlight{order:1}

.room-cell{border-radius:6px;padding:5px 4px;text-align:center;cursor:pointer;border:1.5px solid var(--line);background:var(--paper);transition:transform .1s,box-shadow .1s}
.room-cell:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1);border-color:var(--blue-mid)}
.room-cell.occupied{background:var(--green-light);border-color:#86efac}
.room-cell.vacant{background:var(--red-light);border-color:#fca5a5}
.room-cell.highlight{border-color:var(--amber)!important;background:var(--amber-light)!important;box-shadow:0 0 0 2px var(--amber)}
.room-num{font-size:11px;font-weight:700;color:var(--text);line-height:1.2}
.room-name{font-size:9px;color:var(--text2);line-height:1.3;margin-top:2px;word-break:keep-all;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-cell.vacant .room-name{color:var(--red);font-weight:500}
.room-grid-empty{text-align:center;color:var(--text3);padding:20px 0;font-size:12px}
.card-footer{padding:6px 10px;background:#f8f9fe;border-top:1.5px solid var(--line);display:flex;gap:10px;font-size:10px;color:var(--text2)}
.stat-item{display:flex;align-items:center;gap:3px}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-dot.green{background:var(--green)}.stat-dot.red{background:var(--red)}

/* Detail Panel */
.detail-panel{width:300px;background:var(--paper2);border-left:1.5px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);position:absolute;right:0;top:0;bottom:0;z-index:150;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.detail-panel.open{transform:translateX(0)}
.panel-header{padding:14px 16px 12px;background:var(--blue);color:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.panel-title{font-weight:700;font-size:15px;line-height:1.3;letter-spacing:-.3px}
.panel-subtitle{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px}
.panel-close{background:rgba(255,255,255,.2);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.panel-close:hover{background:rgba(255,255,255,.35)}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}
.info-row{display:flex;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line);gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:var(--text3);font-weight:500;flex-shrink:0;width:70px}
.info-value{font-size:13px;color:var(--text);font-weight:500;word-break:keep-all;flex:1}
.info-value.vacant{color:var(--red);font-weight:700}
.info-value.occupied{color:var(--green);font-weight:700}
.info-value.money{font-weight:700;color:var(--ink2);font-variant-numeric:tabular-nums}
.panel-section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin:14px 0 8px}
.panel-memo{background:var(--paper);border-radius:7px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-all}

/* Zoom Controls */
.zoom-controls{position:absolute;bottom:16px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:100}
.zoom-btn{width:34px;height:34px;background:var(--paper2);border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-size:18px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);color:var(--text);transition:background .12s}
.zoom-btn:hover{background:var(--blue-light);color:var(--blue)}
.zoom-level{background:var(--paper2);border:1.5px solid var(--line);border-radius:8px;height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);box-shadow:var(--shadow)}
.legend{position:absolute;bottom:16px;right:16px;background:var(--paper2);border:1.5px solid var(--line);border-radius:9px;padding:8px 12px;box-shadow:var(--shadow);display:flex;gap:12px;font-size:11px;color:var(--text2);z-index:100}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-box{width:14px;height:14px;border-radius:3px;border:1.5px solid}
.legend-box.occupied{background:var(--green-light);border-color:#86efac}
.legend-box.vacant{background:var(--red-light);border-color:#fca5a5}
.legend-box.unknown{background:var(--paper);border-color:var(--line2)}

/* Filter */
.filter-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:6px;border:1.5px solid var(--line);background:var(--paper2);font-family:inherit;transition:background .12s}
.filter-toggle:hover{background:var(--blue-light)}
.filter-toggle.on{background:var(--red-light);border-color:#fca5a5;color:var(--red)}

/* Status Bar */
.statusbar{height:26px;background:var(--paper2);border-top:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:16px;font-size:11px;color:var(--text3);flex-shrink:0}
.status-badge-s{display:inline-flex;align-items:center;justify-content:center;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:10px;padding:1px 6px;border-radius:4px}

/* ══ EDITOR PAGE ══ */
.editor-layout{flex:1;display:flex;overflow:hidden}
.editor-sidebar{width:320px;min-width:320px;background:var(--paper2);border-right:1.5px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.editor-sidebar-top{padding:14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px}
.editor-sidebar-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}

/* Sheet connection */
.sheet-status{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:var(--paper);border:1.5px solid var(--line);font-size:12px}
.sheet-status.connected{background:var(--green-light);border-color:#86efac;color:var(--green)}
.sheet-status.error{background:var(--red-light);border-color:#fca5a5;color:var(--red)}

.building-selector{display:flex;gap:6px;align-items:center}
.building-selector select{flex:1;height:34px;border:1.5px solid var(--line);border-radius:7px;padding:0 10px;font-size:13px;font-family:inherit;background:var(--paper2);color:var(--text);outline:none}
.building-selector select:focus{border-color:var(--blue)}

/* Editor dong & unit list */
.ed-dong-tabs{display:flex;gap:4px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid var(--line);flex-shrink:0}
.ed-dong-tab{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);color:var(--text2);background:transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ed-dong-tab:hover{border-color:var(--blue-mid);color:var(--blue)}
.ed-dong-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.ed-unit-list{flex:1;overflow-y:auto;padding:6px 8px}
.ed-unit-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .12s;border:1.5px solid transparent}
.ed-unit-row:hover{background:var(--paper)}
.ed-unit-row.active{background:var(--blue-light);border-color:var(--blue-mid)}
.ed-unit-row.placed{opacity:.55}
.ed-unit-row.active.placed{opacity:1}
.ed-unit-ind{width:6px;height:6px;border-radius:50%;background:var(--line2);flex-shrink:0}
.ed-unit-row.placed .ed-unit-ind{background:var(--green)}
.ed-unit-row.active .ed-unit-ind{background:var(--blue)}
.ed-unit-hosu{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--blue)}
.ed-unit-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ed-unit-meta{font-size:10px;color:var(--text3)}

.ed-sidebar-foot{padding:10px 12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.ed-hint{font-size:11px;color:var(--text2);line-height:1.5;padding:8px 10px;background:var(--blue-light);border-radius:6px;border-left:3px solid var(--blue)}
.placed-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:8px;font-weight:700}

/* 전체지도 카드 내 평면도 캔버스 */
.card-floorplan-wrap{overflow:hidden;padding:6px 8px 0;background:var(--paper2)}
.card-floorplan-canvas{width:100%;border-radius:6px;border:1px solid var(--line);background:#f8f9fe;display:block;cursor:pointer}
.card-floorplan-info{font-size:9px;color:var(--text3);padding:3px 8px 6px;text-align:right}
/* 고화질 평면도 오버레이 */
.card-fp-container{position:relative;width:100%;border-radius:6px;border:1px solid var(--line);overflow:visible;background:#f8f9fe;cursor:pointer}
.card-fp-container img{width:100%;display:block;image-rendering:auto}
.card-fp-box{position:absolute;background:rgba(37,99,235,.12);border:2px solid #2563eb;border-radius:3px;overflow:hidden;pointer-events:auto;display:flex;align-items:center;cursor:pointer}
.card-fp-box .fp-name{font-weight:700;color:#1a1c2a;text-align:left;line-height:1.2;white-space:nowrap;padding:2px 4px;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 6px #fff;pointer-events:none}

/* Editor Canvas */
.ed-canvas-area{flex:1;overflow:auto;background:#e8eaf0;background-image:radial-gradient(circle,#c8cde0 1px,transparent 1px);background-size:20px 20px;position:relative}
.ed-canvas-scroller{min-width:100%;min-height:100%;display:flex;align-items:flex-start;justify-content:flex-start;padding:24px}
.ed-canvas-wrapper{position:relative;display:inline-block;box-shadow:var(--shadow-lg);border-radius:2px;cursor:crosshair;user-select:none;flex-shrink:0}
#ed-floorplan-img{display:block;max-width:none}

/* Floor plan drop zone */
.img-dropzone{border:2px dashed var(--line2);border-radius:10px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;background:var(--paper);font-size:13px;color:var(--text2);position:relative;margin:40px}
.img-dropzone:hover,.img-dropzone.drag{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.img-dropzone.has-file{display:none}
.img-dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* Overlay boxes */
.obox{position:absolute;background:rgba(37,99,235,.12);border:2px solid #2563eb;border-radius:3px;cursor:move;user-select:none;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:box-shadow .15s}
.obox:hover{box-shadow:0 0 0 3px rgba(37,99,235,.25)}
.obox.obox-selected{background:rgba(37,99,235,.22);border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(37,99,235,.3)}
.obox-hosu{display:none}
.obox-name{font-size:11px;font-weight:700;color:#1a1c2a;text-align:left;padding:2px 6px;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.obox-del{position:absolute;top:-7px;right:-7px;width:15px;height:15px;background:var(--red);color:#fff;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:20;font-weight:900;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.obox:hover .obox-del-old{display:flex}
.obox-resize{position:absolute;bottom:0;right:0;width:10px;height:10px;cursor:se-resize;background:var(--blue);opacity:.7;border-radius:1px 0 0 0}
.obox-rotate{position:absolute;top:-7px;right:-7px;width:16px;height:16px;background:var(--amber);color:#fff;border-radius:50%;font-size:9px;display:none;align-items:center;justify-content:center;cursor:grab;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.2);line-height:1}
.obox:hover .obox-rotate{display:flex}
.obox:hover .obox-del{display:flex;top:-7px;right:auto;left:-7px}

.placing-hint{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:8px 22px;border-radius:24px;font-size:12px;font-weight:600;pointer-events:none;z-index:200;opacity:0;transition:opacity .25s;box-shadow:0 4px 16px rgba(37,99,235,.35);white-space:nowrap}
.placing-hint.visible{opacity:1}

/* Editor Zoom Bar */
.ed-zoom-bar{position:absolute;bottom:20px;right:20px;background:var(--paper2);border:1.5px solid var(--line);border-radius:10px;display:flex;flex-direction:column;align-items:center;overflow:hidden;box-shadow:var(--shadow);z-index:50}
.ed-zoom-btn{width:36px;height:36px;background:transparent;border:none;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .15s}
.ed-zoom-btn:hover{background:var(--paper);color:var(--blue)}
.ed-zoom-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);padding:3px 4px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);width:100%;text-align:center}

/* 열 정렬 가이드라인 — 드래그 가능한 실선 형태 */
.ed-align-guide{position:absolute;top:0;bottom:0;width:20px;margin-left:-10px;pointer-events:auto;cursor:ew-resize;z-index:35;touch-action:none;user-select:none;display:none}
.ed-align-guide.visible{display:block}
.ed-align-guide-line{position:absolute;top:0;bottom:0;left:50%;width:2px;margin-left:-1px;pointer-events:none;
  background:repeating-linear-gradient(to bottom,#2563eb 0,#2563eb 8px,transparent 8px,transparent 14px);opacity:1;transition:opacity .2s}
.ed-align-guide.snap-off .ed-align-guide-line{opacity:.32;background:repeating-linear-gradient(to bottom,#94a3b8 0,#94a3b8 4px,transparent 4px,transparent 10px)}
.ed-align-guide-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#2563eb;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;pointer-events:none;transition:background .15s}
.ed-align-guide.snap-off .ed-align-guide-label{background:#94a3b8}
.ed-align-snap-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:#2563eb;color:#fff;border:2.5px solid #fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:37;box-shadow:0 2px 6px rgba(37,99,235,.4);pointer-events:auto;transition:background .15s;line-height:1}
.ed-align-guide.snap-off .ed-align-snap-btn{background:#94a3b8;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* Y축 정렬 가이드라인 */
.ed-align-guide-y{position:absolute;left:0;right:0;height:20px;margin-top:-10px;pointer-events:auto;cursor:ns-resize;z-index:35;touch-action:none;user-select:none;display:none}
.ed-align-guide-y.visible{display:block}
.ed-align-guide-y .ed-align-guide-line{position:absolute;left:0;right:0;top:50%;height:2px;margin-top:-1px;width:auto;
  background:repeating-linear-gradient(to right,#d97706 0,#d97706 8px,transparent 8px,transparent 14px);opacity:1}
.ed-align-guide-y .ed-align-guide-label{position:absolute;left:8px;top:50%;transform:translateY(-50%);background:#d97706}
.ed-align-guide-y .ed-align-snap-btn{background:#d97706;box-shadow:0 2px 6px rgba(217,119,6,.4)}

/* 대각선 위젯 제거됨 — 박스 개별 회전으로 대체 */

/* 배치 설정 섹션 */
.ed-place-cfg{padding:8px 14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.ed-place-cfg-row{display:flex;align-items:center;gap:6px}
.ed-place-cfg-label{font-size:10px;font-weight:700;color:var(--text3);min-width:42px;letter-spacing:.3px;text-transform:uppercase}
.ed-seg{display:flex;gap:2px;background:var(--paper);border-radius:6px;padding:2px;border:1.5px solid var(--line);flex:1}
.ed-seg-btn{flex:1;height:22px;font-size:10px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:4px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.ed-seg-btn:hover{color:var(--blue)}
.ed-seg-btn.active{background:var(--blue);color:#fff}
.ed-diag-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--text2);font-weight:500}
.ed-diag-toggle input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px;cursor:pointer}

/* ── TOAST ── */

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Loading */

@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);font-weight:500}

  .topbar-search{display:none}
  .detail-panel{width:100%}
  .building-card{width:280px}

<!-- 여기서부터 JS (다음 스텝에서 추가) -->
<script>

// ═══════════════════════════════════════════════
// COMMON STATE & CONFIG
// ═══════════════════════════════════════════════
const STORAGE_KEY      = 'wirye_map_layout_v2';
const FLOORPLAN_KEY    = 'wirye_floorplans_v2'; // 건물별 그룹명별 평면도 저장
const SHEET_ID  = '19KWBXPiK-qXycopkNRHNMddmux2cKohtm7fLLyfiZGw';
const SHEET_GID = '805020193';

let buildings = {};   // { bName: { dong: { floor: [rooms] } } }
let cardStates = {};
let positions = {};
let floorplans = {};  // { bName: { groupName: { boxes, imgDataURL, ... } } }
let zoomScale = 1.0;
let panOffset = { x: 80, y: 80 };
let isPanning = false, panStart = { x: 0, y: 0 };
let isDraggingCard = false;
let vacantOnly = false, searchQuery = '';
let rawSheetRows = []; // 원본 시트 행 전체 보관
let sheetHeaders = [];

// 자동 저장 (디바운스)
let _autoSaveTimer = null;
function autoSavePositions() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
  }, 800);
}

const FLOOR_ORDER = f => {
  if (f === '미지정') return 999;
  const m = f.match(/(\d+)/);
  const n = m ? parseInt(m[1]) : 0;
  return f.includes('지하') ? -n : n;
};

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function parseFloor(room) {
  room = String(room).trim();
  if (!room) return '미지정';
  if (room[0].toUpperCase() === 'B') {
    const d = room.replace(/\D/g, '');
    if (d) { const n = d.length > 2 ? d.slice(0,-2)||'1' : d[0]; return `지하${n.replace(/^0+/,'')||'1'}층`; }
    return '지하1층';
  }
  const d = room.replace(/\D/g, '');
  if (!d) return '미지정';
  if (d.length <= 2) return '1층';
  return `${d.slice(0,-2).replace(/^0+/,'')||'1'}층`;
}

// ═══════════════════════════════════════════════
// PAGE SWITCHING
// ═══════════════════════════════════════════════
function switchPage(page) {
  document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('tab-' + page).classList.add('active');
  // 전체지도용 컨트롤 표시/숨김
  document.getElementById('mapSearchWrap').style.display = page === 'map' ? '' : 'none';
  document.getElementById('mapActions').style.display = page === 'map' ? '' : 'none';
}

// ═══════════════════════════════════════════════
// LOAD DATA — 구글 시트 gviz
// ═══════════════════════════════════════════════
function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  fetch(url)
    .then(r => r.text())
    .then(text => {
      try {
        const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
        if (json.status === 'error') throw new Error(json.errors?.[0]?.detailed_message || '시트 오류');
        const table = json.table;
        const cols = table.cols.map(c => (c.label || c.id || '').trim());
        sheetHeaders = cols;
        const rows = table.rows.map(row => {
          const rec = {};
          (row.c || []).forEach((cell, i) => {
            if (i < cols.length && cols[i]) rec[cols[i]] = cell ? (cell.f ?? (cell.v != null ? String(cell.v) : '')) : '';
          });
          return rec;
        });
        rawSheetRows = rows;
        buildings = groupRows(rows);
        // 편집기 건물 목록도 채우기
        edPopulateBuildings(rows);
        document.getElementById('edSheetStatus').className = 'sheet-status connected';
        document.getElementById('edSheetStatus').textContent = `✅ ${rows.length}개 행 로드됨`;
      } catch (e) {
        showToast('데이터 로드 실패: ' + e.message);
        buildings = {};
        document.getElementById('edSheetStatus').className = 'sheet-status error';
        document.getElementById('edSheetStatus').textContent = '❌ 로드 실패';
      }
      document.getElementById('loadingOverlay').style.display = 'none';
      initMap();
    })
    .catch(() => {
      showToast('구글 시트 연결 실패');
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('edSheetStatus').className = 'sheet-status error';
      document.getElementById('edSheetStatus').textContent = '❌ 연결 실패';
      initMap();
    });
}

function groupRows(rows) {
  const g = {};
  rows.forEach(row => {
    const b = (row['건물명'] || row['상가명'] || '').trim();
    const d = (row['동'] || '').trim() || '단일동';
    const h = (row['호'] || '').trim();
    const f = parseFloor(h);
    if (!b) return;
    if (!g[b]) g[b] = {};
    if (!g[b][d]) g[b][d] = {};
    if (!g[b][d][f]) g[b][d][f] = [];
    g[b][d][f].push(row);
  });
  return g;
}

// ═══════════════════════════════════════════════
// MAP — INIT
// ═══════════════════════════════════════════════
function initMap() {
  loadPositions();
  renderAllCards();
  updateStats();
  applyTransform();
}

function loadPositions() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) positions = JSON.parse(s); } catch(e) { positions = {}; }
  try {
    const f = localStorage.getItem(FLOORPLAN_KEY); if (f) floorplans = JSON.parse(f);
    // v1→v2 마이그레이션: 구 형식(boxes가 바로 있는 경우) → 그룹명별 구조로 변환
    for (const [bName, val] of Object.entries(floorplans)) {
      if (val && val.boxes && val.imgDataURL) {
        const gName = val.groupName || val.floor || '1층';
        floorplans[bName] = { [gName]: val };
      }
    }
  } catch(e) { floorplans = {}; }
}
function savePositions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); showToast('✅ 배치 저장 완료'); }
function getDefaultPosition(idx) { const c = idx % 3; const r = Math.floor(idx / 3); return { x: 40 + c*350, y: 40 + r*480 }; }

function renderAllCards() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  Object.keys(buildings).sort().forEach((bName, idx) => {
    const cardId = 'card_' + btoa(encodeURIComponent(bName)).replace(/[^a-zA-Z0-9]/g, '_');
    if (!cardStates[cardId]) {
      const dongs = buildings[bName];
      const fs = Object.keys(dongs).sort()[0];
      const floors = Object.keys(dongs[fs] || {}).sort((a,b) => FLOOR_ORDER(a)-FLOOR_ORDER(b));
      cardStates[cardId] = { section: fs, floor: floors.includes('1층') ? '1층' : (floors[0]||'') };
    }
    if (!positions[cardId]) positions[cardId] = getDefaultPosition(idx);
    canvas.appendChild(createCard(bName, cardId));
  });
  updateStats();
}

function createCard(bName, cardId) {
  const dongs = buildings[bName], state = cardStates[cardId], pos = positions[cardId];
  const card = document.createElement('div');
  card.className='building-card'; card.id=cardId;
  card.style.left=pos.x+'px'; card.style.top=pos.y+'px'; card.style.zIndex=10;
  let totalRooms=0;
  Object.values(dongs).forEach(fl => Object.values(fl).forEach(rs => totalRooms+=rs.length));
  card.innerHTML=`<div class="card-header" data-drag="true"><div class="card-title-row"><div class="card-building-name">${escHtml(bName)}</div><div class="card-grip"><span></span><span></span><span></span></div></div><div class="card-room-count">전체 ${totalRooms}개 호실</div></div>`;

  // 평면도 그룹이 있으면 → 그룹 탭만 표시 (동/층 탭 숨김)
  const fpGroups = floorplans[bName];
  const hasFloorplans = fpGroups && typeof fpGroups === 'object' && Object.keys(fpGroups).some(g => fpGroups[g]?.imgDataURL);

  if (!hasFloorplans) {
    // 평면도 없음 → 기존 동/층 탭
    const sNames = Object.keys(dongs).sort();
    if (sNames.length > 1) {
      const sb = document.createElement('div'); sb.className='section-tabs';
      sNames.forEach(s => { const b=document.createElement('button'); b.className='section-tab'+(s===state.section?' active':''); b.textContent=s; b.addEventListener('click',e=>{e.stopPropagation();switchSection(cardId,bName,s);}); sb.appendChild(b); });
      card.appendChild(sb);
    }
    const curD = dongs[state.section]||{};
    const fNames = Object.keys(curD).sort((a,b)=>FLOOR_ORDER(a)-FLOOR_ORDER(b));
    const fb = document.createElement('div'); fb.className='floor-tabs';
    fNames.forEach(fl => { const b=document.createElement('button'); b.className='floor-tab'+(fl===state.floor?' active':''); b.textContent=fl; b.addEventListener('click',e=>{e.stopPropagation();switchFloor(cardId,bName,fl);}); fb.appendChild(b); });
    card.appendChild(fb);
  }
  card.appendChild(buildRoomGrid(cardId,bName));
  card.appendChild(buildFooterStats(bName,state));
  setupCardDrag(card,cardId);
  return card;
}

function buildRoomGrid(cardId,bName) {
  // 저장된 평면도가 있으면 해당 카드에 그룹별 평면도 렌더
  const fpGroups = floorplans[bName];
  if (fpGroups && typeof fpGroups === 'object' && !searchQuery && !vacantOnly) {
    const groupNames = Object.keys(fpGroups).filter(g => fpGroups[g]?.imgDataURL);
    if (groupNames.length > 0) {
      const activeGroup = cardStates[cardId]?.fpGroup || groupNames[0];
      const fp = fpGroups[activeGroup] || fpGroups[groupNames[0]];
      if (fp) return buildFloorplanGroupView(bName, cardId, fpGroups, groupNames, activeGroup);
    }
  }

  const state=cardStates[cardId], rooms=(buildings[bName][state.section]||{})[state.floor]||[];
  const wrap=document.createElement('div'); wrap.className='room-grid-wrap';
  let fr = vacantOnly ? rooms.filter(r=>isVacant(r)) : rooms;
  // 검색 시: 전체 보여주되 매칭 항목 앞으로
  if (searchQuery) {
    const matched = rooms.filter(r=>matchSearch(r,searchQuery));
    const rest = rooms.filter(r=>!matchSearch(r,searchQuery));
    fr = [...matched, ...rest];
    if (!matched.length) { wrap.innerHTML=`<div class="room-grid-empty">검색 결과 없음</div>`; return wrap; }
  }
  if (!fr.length) { wrap.innerHTML=`<div class="room-grid-empty">${rooms.length===0?'호실 데이터 없음':'검색 결과 없음'}</div>`; return wrap; }
  const grid=document.createElement('div'); grid.className='room-grid'+(searchQuery?' search-active':'');
  fr.forEach(room => {
    const cell=document.createElement('div');
    cell.className='room-cell'+(isOccupied(room)?' occupied':isVacant(room)?' vacant':'');
    if (searchQuery&&matchSearch(room,searchQuery)) cell.classList.add('highlight');
    cell.innerHTML=`<div class="room-num">${room['호']||'-'}</div><div class="room-name">${roomName(room)||'공실'}</div>`;
    cell.addEventListener('click',e=>{e.stopPropagation();openDetail(room,bName);});
    grid.appendChild(cell);
  });
  wrap.appendChild(grid); return wrap;
}

// 전체지도 카드 — 그룹 탭 + 평면도
function buildFloorplanGroupView(bName, cardId, fpGroups, groupNames, activeGroup) {
  const outer = document.createElement('div');
  // 그룹 탭 (2개 이상일 때만 표시)
  if (groupNames.length > 1) {
    const tabs = document.createElement('div'); tabs.className='floor-tabs';
    groupNames.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'floor-tab' + (g === activeGroup ? ' active' : '');
      btn.textContent = g;
      btn.addEventListener('click', ev => {
        ev.stopPropagation();
        cardStates[cardId].fpGroup = g;
        rebuildCard(cardId, bName);
      });
      tabs.appendChild(btn);
    });
    outer.appendChild(tabs);
  }
  const fp = fpGroups[activeGroup];
  if (fp) outer.appendChild(buildFloorplanView(bName, fp));
  return outer;
}

// 전체지도 카드 내 평면도 미니 뷰 (고화질 — 원본 이미지 + CSS 오버레이)
function buildFloorplanView(bName, fp) {
  const wrap = document.createElement('div'); wrap.className='card-floorplan-wrap';
  const boxCount = Object.keys(fp.boxes).length;

  const container = document.createElement('div'); container.className='card-fp-container';
  const img = document.createElement('img');
  img.src = fp.imgDataURL;
  img.alt = '평면도';
  img.draggable = false;
  container.appendChild(img);

  // 이미지 로드 후 컨테이너/원본 비율로 글씨 크기 계산 (편집기와 동일 비율)
  const renderBoxes = () => {
    container.querySelectorAll('.card-fp-box').forEach(el => el.remove());
    // 편집기에서 상호명 11px @ 원본이미지 기준 → 카드에서도 같은 비율
    // scale = 카드표시폭 / 원본이미지폭
    const cW = container.offsetWidth || 300;
    const natW = img.naturalWidth || cW;
    const scale = cW / natW;
    for (const [hosu, b] of Object.entries(fp.boxes)) {
      const box = document.createElement('div'); box.className='card-fp-box';
      box.style.left=b.x+'%'; box.style.top=b.y+'%'; box.style.width=b.w+'%'; box.style.height=b.h+'%';
      if(b.rot) box.style.transform=`rotate(${b.rot}deg)`;
      // 편집기 obox-name = 11px @ 원본크기 → 카드에서는 11 * scale
      const fName = 11 * scale;
      const ta = b.textAlign || 'left';
      box.innerHTML = `<span class="fp-name" style="font-size:${fName.toFixed(1)}px;text-align:${ta}">${b.name||hosu}</span>`;
      box.style.pointerEvents = 'auto';
      box.style.cursor = 'pointer';
      box.dataset.hosu = hosu;
      box.dataset.bname = bName;
      box.addEventListener('click', (ev) => {
        ev.stopPropagation();
        // rawSheetRows에서 해당 호실 찾기
        const room = rawSheetRows.find(r => (r['호']||'') === hosu && (r['상가명']||'').includes(bName));
        if (room) openDetail(room, bName);
        else showToast(`${hosu}호 정보 없음`);
      });
      container.appendChild(box);
    }
  };
  img.onload = renderBoxes;
  // 폴백: 이미 캐싱된 이미지
  if (img.complete) requestAnimationFrame(renderBoxes);

  container.title = '클릭하면 편집';
  container.addEventListener('click', () => { edLoadBuildingByName(bName); switchPage('editor'); });
  wrap.appendChild(container);

  const info = document.createElement('div'); info.className='card-floorplan-info';
  info.textContent = `${fp.groupName||''} • 배치 ${boxCount}개 — 클릭하면 편집`;
  wrap.appendChild(info);
  return wrap;
}

function buildFooterStats(bName,state) {
  const rooms=(buildings[bName][state.section]||{})[state.floor]||[];
  const v=rooms.filter(r=>isVacant(r)).length, o=rooms.filter(r=>isOccupied(r)).length;
  const d=document.createElement('div'); d.className='card-footer';
  d.innerHTML=`<div class="stat-item"><div class="stat-dot green"></div>입점 ${o}</div><div class="stat-item"><div class="stat-dot red"></div>공실 ${v}</div><div class="stat-item" style="margin-left:auto;color:var(--text3)">총 ${rooms.length}</div>`;
  return d;
}

function switchSection(cid,bn,s){const st=cardStates[cid];st.section=s;const fl=Object.keys(buildings[bn][s]||{}).sort((a,b)=>FLOOR_ORDER(a)-FLOOR_ORDER(b));st.floor=fl.includes('1층')?'1층':(fl[0]||'');rebuildCard(cid,bn);}
function switchFloor(cid,bn,f){cardStates[cid].floor=f;rebuildCard(cid,bn);}
function rebuildCard(cid,bn){const o=document.getElementById(cid);if(!o)return;const z=o.style.zIndex;const n=createCard(bn,cid);n.style.zIndex=z;o.replaceWith(n);}

function roomName(r){return(r['현재상호']||r['상호']||'').trim();}
function isVacant(r){const n=roomName(r);return n===''||n==='공실'||n==='-';}
function isOccupied(r){return!isVacant(r);}
function matchSearch(r,q){const l=q.toLowerCase();return roomName(r).toLowerCase().includes(l)||(r['호']||'').toLowerCase().includes(l)||(r['과거입점상호']||'').toLowerCase().includes(l);}

// ── CARD DRAG ──
function setupCardDrag(card,cardId){
  function onDown(e){
    if(!e.target.closest('[data-drag]')&&!e.target.closest('.card-grip'))return;
    if(e.target.tagName==='BUTTON')return;
    e.preventDefault();isDraggingCard=true;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    const sL=positions[cardId].x,sT=positions[cardId].y;
    card.style.zIndex=100;card.classList.add('dragging');
    function onMove(e2){const x2=e2.touches?e2.touches[0].clientX:e2.clientX,y2=e2.touches?e2.touches[0].clientY:e2.clientY;positions[cardId].x=sL+(x2-cx)/zoomScale;positions[cardId].y=sT+(y2-cy)/zoomScale;card.style.left=positions[cardId].x+'px';card.style.top=positions[cardId].y+'px';}
    function onUp(){isDraggingCard=false;card.style.zIndex=10;card.classList.remove('dragging');autoSavePositions();document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onUp);}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onUp);
  }
  card.addEventListener('mousedown',onDown);card.addEventListener('touchstart',onDown,{passive:false});
}

// ── PAN & ZOOM ──
function applyTransform(){document.getElementById('canvas').style.transform=`translate(${panOffset.x}px,${panOffset.y}px) scale(${zoomScale})`;document.getElementById('zoomLevel').textContent=Math.round(zoomScale*100)+'%';}
function setZoom(n){zoomScale=Math.min(Math.max(n,.1),8);applyTransform();}
const wrapper=document.getElementById('canvasWrapper');
wrapper.addEventListener('mousedown',e=>{if(isDraggingCard||e.target.closest('.building-card'))return;isPanning=true;panStart={x:e.clientX-panOffset.x,y:e.clientY-panOffset.y};wrapper.classList.add('panning');});
document.addEventListener('mousemove',e=>{if(!isPanning)return;panOffset.x=e.clientX-panStart.x;panOffset.y=e.clientY-panStart.y;applyTransform();});
document.addEventListener('mouseup',()=>{isPanning=false;wrapper.classList.remove('panning');});
wrapper.addEventListener('wheel',e=>{e.preventDefault();const step=zoomScale*0.12;setZoom(zoomScale+(e.deltaY>0?-step:step));},{passive:false});
document.getElementById('zoomIn').addEventListener('click',()=>setZoom(zoomScale*1.25));
document.getElementById('zoomOut').addEventListener('click',()=>setZoom(zoomScale/1.25));
document.getElementById('zoomFit').addEventListener('click',()=>{zoomScale=1;panOffset={x:80,y:80};applyTransform();});

// ── DETAIL PANEL ──
function openDetail(room,bName){
  const p=document.getElementById('detailPanel'),t=document.getElementById('panelTitle'),st=document.getElementById('panelSubtitle'),bd=document.getElementById('panelBody');
  const ho=room['호']||'-',nm=roomName(room)||'공실',dong=room['동']||'',fl=parseFloor(room['호']||'');
  t.textContent=`${ho}호 — ${nm}`; st.textContent=`${bName}${dong?' · '+dong:''} · ${fl}`;
  const rv=k=>room[k]||'';
  const fields=[['상태',isVacant(room)?'<span class="info-value vacant">공실</span>':'<span class="info-value occupied">입점</span>'],['현재상호',rv('현재상호')||rv('상호')],['과거상호',rv('과거입점상호')],['전용(평)',rv('전용(평)')||rv('전용 평')],['보증금',rv('보증금')?rv('보증금')+' 만원':''],['월세',rv('월세')?rv('월세')+' 만원':''],['매매가',rv('매매가')],['소유자',rv('소유자')],['프로세스',rv('프로세스')],['유형',rv('유형')]];
  let html='';
  fields.forEach(([l,v])=>{if(!v)return;const c=l==='보증금'||l==='월세'||l==='매매가'?' money':'';html+=`<div class="info-row"><div class="info-label">${l}</div><div class="info-value${c}">${v}</div></div>`;});
  const memo=rv('상담 내용')||rv('내용');
  if(memo) html+=`<div class="panel-section-title">상담 내용</div><div class="panel-memo">${escHtml(memo)}</div>`;
  bd.innerHTML=html||'<div style="color:var(--text3);text-align:center;padding:20px">데이터 없음</div>';
  p.classList.add('open');
}
document.getElementById('panelClose').addEventListener('click',()=>document.getElementById('detailPanel').classList.remove('open'));

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim();refreshAllCards();const ss=document.getElementById('statSearch');if(searchQuery){let c=0;Object.values(buildings).forEach(d=>Object.values(d).forEach(fl=>Object.values(fl).forEach(rs=>rs.forEach(r=>{if(matchSearch(r,searchQuery))c++;}))));document.getElementById('statSearchCount').textContent=c;ss.style.display='flex';}else ss.style.display='none';});

// ── VACANT FILTER ──
document.getElementById('vacantFilter').addEventListener('click',function(){vacantOnly=!vacantOnly;this.classList.toggle('on',vacantOnly);this.textContent=vacantOnly?'전체 보기':'공실만';refreshAllCards();});

function refreshAllCards(){Object.keys(buildings).forEach((bn)=>{const cid='card_'+btoa(encodeURIComponent(bn)).replace(/[^a-zA-Z0-9]/g,'_');rebuildCard(cid,bn);});updateStats();}

function updateStats(){const bn=Object.keys(buildings);document.getElementById('statBuildings').textContent=bn.length;let t=0,v=0;bn.forEach(b=>Object.values(buildings[b]).forEach(fl=>Object.values(fl).forEach(rs=>{t+=rs.length;v+=rs.filter(r=>isVacant(r)).length;})));document.getElementById('statRooms').textContent=t;document.getElementById('statVacant').textContent=v;}

document.getElementById('saveLayout').addEventListener('click',savePositions);
document.getElementById('resetLayout').addEventListener('click',()=>{if(!confirm('배치를 초기화할까요?'))return;localStorage.removeItem(STORAGE_KEY);positions={};Object.keys(buildings).forEach((bn,i)=>{const cid='card_'+btoa(encodeURIComponent(bn)).replace(/[^a-zA-Z0-9]/g,'_');positions[cid]=getDefaultPosition(i);const c=document.getElementById(cid);if(c){c.style.left=positions[cid].x+'px';c.style.top=positions[cid].y+'px';}});showToast('배치 초기화 완료');});

// ═══════════════════════════════════════════════
// EDITOR — STATE
// ═══════════════════════════════════════════════
let edUnits = [];
let edBoxes = {};
let edSelectedUnit = null;
let edImageURL = null;
let edImgNW = 0, edImgNH = 0;
let edZoom = 1.0;
let edActiveDong = '전체';
let edDragging = null, edResizing = null;

// ── 상자 설정 모드 상태 ──
let edBoxMode = false;        // 상자 설정 모드 ON/OFF
let edAxisXOn = false;        // X축 정렬선 ON
let edAxisXPos = 20;          // X축 정렬선 위치 (%)
let edAxisXAnchor = 'left';   // 'left' | 'right'
let edAxisYOn = false;        // Y축 정렬선 ON
let edAxisYPos = 30;          // Y축 정렬선 위치 (%)
let edAxisYAnchor = 'top';    // 'top' | 'bottom'
let edBoxModeRot = 0;         // 설정 모드 각도 (첫 박스 기준)
let edBoxModeRotSet = false;  // 각도가 설정되었는지
let edTextAlign = 'left';    // 텍스트 정렬: 'left' | 'center' | 'right'

// 그룹명(층명) 상태
let edGroupNameVal = '';

// ── 상자 설정 모드 토글 ──
function edToggleBoxMode() {
  edBoxMode = !edBoxMode;
  const btn = document.getElementById('edBoxModeBtn');
  const panel = document.getElementById('edBoxModePanel');
  btn.textContent = edBoxMode ? '⏹ ON' : '▶ OFF';
  btn.classList.toggle('primary', edBoxMode);
  panel.style.display = edBoxMode ? 'flex' : 'none';
  if (!edBoxMode) {
    // OFF시 정렬선 숨기기
    edAxisXOn = false; edAxisYOn = false;
    edBoxModeRotSet = false; edBoxModeRot = 0;
    edTextAlign = 'left';
    edSetTextAlign('left');
    edUpdateAxisUI();
  }
  edUpdateAlignGuide();
  showToast(edBoxMode ? '⚙️ 상자 설정 모드 ON — 이후 배치되는 박스에 적용' : '상자 설정 모드 OFF');
}

function edToggleAxisLine(axis) {
  if (axis === 'x') { edAxisXOn = !edAxisXOn; }
  else { edAxisYOn = !edAxisYOn; }
  edUpdateAxisUI();
  edUpdateAlignGuide();
}

function edSetAnchor(axis, anchor) {
  if (axis === 'x') edAxisXAnchor = anchor;
  else edAxisYAnchor = anchor;
  // 버튼 UI
  if (axis === 'x') {
    document.getElementById('edAnchorXLeft').classList.toggle('active', anchor==='left');
    document.getElementById('edAnchorXRight').classList.toggle('active', anchor==='right');
  } else {
    document.getElementById('edAnchorYTop').classList.toggle('active', anchor==='top');
    document.getElementById('edAnchorYBottom').classList.toggle('active', anchor==='bottom');
  }
}

function edSetTextAlign(align) {
  edTextAlign = align;
  document.getElementById('edTextAlignLeft').classList.toggle('active', align==='left');
  document.getElementById('edTextAlignCenter').classList.toggle('active', align==='center');
  document.getElementById('edTextAlignRight').classList.toggle('active', align==='right');
}

function edUpdateAxisUI() {
  const xBtn = document.getElementById('edAlignXBtn');
  const xSeg = document.getElementById('edAlignXAnchorSeg');
  xBtn.textContent = edAxisXOn ? 'ON' : 'OFF';
  xBtn.classList.toggle('primary', edAxisXOn);
  xSeg.style.display = edAxisXOn ? '' : 'none';

  const yBtn = document.getElementById('edAlignYBtn');
  const ySeg = document.getElementById('edAlignYAnchorSeg');
  yBtn.textContent = edAxisYOn ? 'ON' : 'OFF';
  yBtn.classList.toggle('primary', edAxisYOn);
  ySeg.style.display = edAxisYOn ? '' : 'none';

  const aLbl = document.getElementById('edBoxModeAngleLabel');
  if (aLbl) aLbl.textContent = edBoxModeRot + '°';
}

// 그룹명(층명) 적용
function edApplyGroupName() {
  const inp = document.getElementById('edGroupName');
  edGroupNameVal = (inp.value || '').trim();
  if (!edGroupNameVal) { showToast('그룹(층) 이름을 입력하세요'); return; }
  showToast(`✅ 그룹명 "${edGroupNameVal}" 적용됨`);
}

// ── 정렬 가이드라인 렌더 ──
function edUpdateAlignGuide() {
  const wr = document.getElementById('edCanvasWrapper');
  if (!wr) return;
  // X축 (세로선)
  edCreateOrUpdateGuideX(wr, 'edAlignGuideX', edBoxMode && edAxisXOn, edAxisXPos, edAxisXAnchor === 'left' ? '← L' : 'R →');
  // Y축 (가로선)
  edCreateOrUpdateGuideY(wr, 'edAlignGuideY', edBoxMode && edAxisYOn, edAxisYPos, edAxisYAnchor === 'top' ? '↑ T' : 'B ↓');
}

function edCreateOrUpdateGuideX(wr, guideId, isOn, xPos, labelText) {
  let guide = document.getElementById(guideId);
  if (!isOn) { if (guide) guide.classList.remove('visible'); return; }
  if (!guide) {
    guide = document.createElement('div');
    guide.id = guideId;
    guide.className = 'ed-align-guide';
    const line = document.createElement('div'); line.className = 'ed-align-guide-line'; guide.appendChild(line);
    const label = document.createElement('div'); label.className = 'ed-align-guide-label'; guide.appendChild(label);
    wr.appendChild(guide);
    guide.addEventListener('mousedown', ev => {
      ev.preventDefault(); ev.stopPropagation();
      const startX = ev.clientX, startPos = edAxisXPos;
      const move = mv => {
        edAxisXPos = Math.max(0, Math.min(98, startPos + (mv.clientX - startX) / (edImgNW * edZoom) * 100));
        edUpdateAlignGuide();
        // 가이드 위치만 갱신 (기존 박스는 움직이지 않음)
      };
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    });
  }
  guide.classList.add('visible'); guide.classList.remove('snap-off');
  guide.style.left = xPos + '%';
  guide.querySelector('.ed-align-guide-label').textContent = labelText;
}

function edCreateOrUpdateGuideY(wr, guideId, isOn, yPos, labelText) {
  let guide = document.getElementById(guideId);
  if (!isOn) { if (guide) guide.classList.remove('visible'); return; }
  if (!guide) {
    guide = document.createElement('div');
    guide.id = guideId;
    guide.className = 'ed-align-guide-y';
    const line = document.createElement('div'); line.className = 'ed-align-guide-line'; guide.appendChild(line);
    const label = document.createElement('div'); label.className = 'ed-align-guide-label'; guide.appendChild(label);
    wr.appendChild(guide);
    guide.addEventListener('mousedown', ev => {
      ev.preventDefault(); ev.stopPropagation();
      const startY = ev.clientY, startPos = edAxisYPos;
      const move = mv => {
        edAxisYPos = Math.max(0, Math.min(98, startPos + (mv.clientY - startY) / (edImgNH * edZoom) * 100));
        edUpdateAlignGuide();
        // 가이드 위치만 갱신 (기존 박스는 움직이지 않음)
      };
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    });
  }
  guide.classList.add('visible');
  guide.style.top = yPos + '%';
  guide.querySelector('.ed-align-guide-label').textContent = labelText;
}

// ── 건물 목록 채우기 ──
function edPopulateBuildings(rows) {
  const bCol = sheetHeaders.find(h => h === '건물명' || h === '상가명') || '';
  const names = [...new Set(rows.map(r => (r[bCol]||'').trim()).filter(Boolean))].sort();
  const sel = document.getElementById('edBuildingSelect');
  sel.innerHTML = '<option value="">-- 건물을 선택하세요 --</option>' + names.map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');

// ── 건물 선택 → 해당 건물 호실 로드 ──
function edLoadBuilding() {
  const bName = document.getElementById('edBuildingSelect').value;
  if (!bName) { showToast('건물을 선택하세요'); return; }
  const bCol = sheetHeaders.find(h => h === '건물명' || h === '상가명') || '';
  const filtered = rawSheetRows.filter(r => (r[bCol]||'').trim() === bName);
  if (!filtered.length) { showToast('해당 건물 데이터 없음'); return; }

  const hoCol = sheetHeaders.find(h => h === '호') || '';
  const nameCol = sheetHeaders.find(h => h === '현재상호' || h === '상호') || '';
  const dongCol = sheetHeaders.find(h => h === '동') || '';

  edUnits = filtered.map(r => ({
    상가명: (r[bCol]||'').trim(),
    동: (r[dongCol]||'').trim(),
    호수: String(r[hoCol]||'').trim(),
    상호명: (r[nameCol]||'').trim()
  })).filter(u => u.호수);

  edActiveDong = '전체';
  edBoxes = {};
  edGroupNameVal = '';
  const inp = document.getElementById('edGroupName');
  if (inp) inp.value = '';

  // 그룹명별 저장 목록 렌더
  edRenderGroupTabs(bName);

  // 첫 번째 저장 그룹 자동 로드
  const fpGroups = floorplans[bName];
  if (fpGroups && typeof fpGroups === 'object') {
    const firstGroup = Object.keys(fpGroups)[0];
    if (firstGroup) edLoadGroup(bName, firstGroup);
    else showToast(`✅ ${bName} — ${edUnits.length}개 호실 로드`);
  } else {
    showToast(`✅ ${bName} — ${edUnits.length}개 호실 로드`);
  }

  edSelectedUnit = null;
  edRenderDongTabs();
  edRenderUnitList();
}

// ── 그룹 탭 렌더 (편집기 사이드바) ──
function edRenderGroupTabs(bName) {
  let container = document.getElementById('edGroupTabs');
  if (!container) {
    // 그룹 탭 컨테이너 생성 (그룹명 입력란 앞에 삽입)
    container = document.createElement('div');
    container.id = 'edGroupTabs';
    container.className = 'ed-dong-tabs';
    container.style.borderBottom = '1px solid var(--line)';
    const cfg = document.getElementById('edGroupCfg');
    cfg.parentElement.insertBefore(container, cfg);
  }
  container.innerHTML = '';
  const fpGroups = floorplans[bName];
  if (!fpGroups || typeof fpGroups !== 'object') { container.style.display='none'; return; }
  const groupNames = Object.keys(fpGroups);
  if (groupNames.length === 0) { container.style.display='none'; return; }
  container.style.display = '';

  // 새 그룹(+) 버튼
  groupNames.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'ed-dong-tab' + (g === edGroupNameVal ? ' active' : '');
    btn.textContent = g;
    btn.addEventListener('click', () => edLoadGroup(bName, g));
    container.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'ed-dong-tab';
  addBtn.textContent = '+ 새 그룹';
  addBtn.style.color = 'var(--blue)';
  addBtn.addEventListener('click', () => {
    edBoxes = {};
    edGroupNameVal = '';
    edImageURL = '';
    document.getElementById('edGroupName').value = '';
    document.getElementById('ed-floorplan-img').src = '';
    document.getElementById('edDropzone').classList.remove('has-file');
    document.getElementById('edCanvasScroller').style.display = 'none';
    document.getElementById('edZoomBar').style.display = 'none';
    edRenderAllBoxes(); edRenderUnitList();
    edRenderGroupTabs(bName);
    showToast('새 그룹 — 그룹명을 입력하고 이미지를 업로드하세요');
  });
  container.appendChild(addBtn);
}

// 특정 그룹 로드 (이미지 + 박스 복원)
function edLoadGroup(bName, gName) {
  const fpGroups = floorplans[bName];
  if (!fpGroups || !fpGroups[gName]) return;
  const saved = fpGroups[gName];

  edGroupNameVal = gName;
  document.getElementById('edGroupName').value = gName;

  // 박스 복원
  const uMap = Object.fromEntries(edUnits.map(u=>[u.호수,u]));
  edBoxes = {};
  if (saved.boxes) {
    for (const [hosu,b] of Object.entries(saved.boxes)) {
      const unit = uMap[hosu]; if (unit) edBoxes[hosu]={...b,unit};
    }
  }

  // 이미지 복원
  if (saved.imgDataURL) {
    edImageURL = saved.imgDataURL;
    document.getElementById('edDropzone').classList.add('has-file');
    document.getElementById('edCanvasScroller').style.display = '';
    document.getElementById('edZoomBar').style.display = '';
    const img = document.getElementById('ed-floorplan-img');
    img.src = saved.imgDataURL;
    img.onload = () => {
      edImgNW = img.naturalWidth; edImgNH = img.naturalHeight;
      edApplyZoom(); edRenderAllBoxes(); edUpdateAlignGuide();
    };
    document.getElementById('edCanvasWrapper').addEventListener('click', edOnCanvasClick);
  }

  edRenderGroupTabs(bName);
  edRenderUnitList();
  showToast(`✅ "${gName}" 그룹 로드 (${Object.keys(edBoxes).length}개 박스)`);
}

// 전체지도 카드에서 건물명으로 직접 로드
function edLoadBuildingByName(bName) {

}

// ── 호실 목록 ──
function edRenderUnitList() {
  const list = document.getElementById('edUnitList');

  list.innerHTML = '';
  let fr = edActiveDong === '전체' ? edUnits : edUnits.filter(u=>u.동===edActiveDong);
  if (q) fr = fr.filter(u=>u.호수.toLowerCase().includes(q)||u.상호명.toLowerCase().includes(q));
  fr.forEach(u => {
    const placed = !!edBoxes[u.호수], isSel = edSelectedUnit?.호수===u.호수;
    const row = document.createElement('div');

    row.innerHTML = `<div class="ed-unit-ind"></div><div style="flex:1;min-width:0"><div class="ed-unit-hosu">${u.호수}</div><div class="ed-unit-name">${u.상호명||'(상호 없음)'}</div>${u.동?`<div class="ed-unit-meta">${u.동}</div>`:''}</div>`;
    row.addEventListener('click', () => edSelectUnit(u));

  });

function edSelectUnit(u) {
  edSelectedUnit = u; edRenderUnitList();
  const h = document.getElementById('edPlacingHint');
  h.textContent = `📍 "${u.호수} ${u.상호명}" — 평면도에서 위치 클릭`;

  setTimeout(()=>h.classList.remove('visible'), 3500);
}

// ── 캔버스 클릭 → 박스 배치 ──
function edOnCanvasClick(e) {
  if (!edSelectedUnit) return;
  if (e.target.closest('.obox') || e.target.closest('.ed-align-guide')) return;
  const wr = document.getElementById('edCanvasWrapper').getBoundingClientRect();
  const px = (e.clientX - wr.left) / edZoom, py = (e.clientY - wr.top) / edZoom;
  const boxW = (90 / edImgNW) * 100, boxH = (34 / edImgNH) * 100;
  let bx = (px / edImgNW) * 100, by = (py / edImgNH) * 100;

  let rot = 0;
  // 상자 설정 모드 적용
  if (edBoxMode) {
    if (edAxisXOn) {
      if (edAxisXAnchor === 'left') bx = edAxisXPos;
      else bx = edAxisXPos - boxW;
    }
    if (edAxisYOn) {
      if (edAxisYAnchor === 'top') by = edAxisYPos;
      else by = edAxisYPos - boxH;
    }
    if (edBoxModeRotSet) rot = edBoxModeRot;
  }

  bx = Math.max(0, Math.min(98 - boxW, bx));
  by = Math.max(0, Math.min(98 - boxH, by));

  const tAlign = edBoxMode ? edTextAlign : 'left';
  edBoxes[edSelectedUnit.호수] = { x: bx, y: by, w: boxW, h: boxH, rot: rot, name: edSelectedUnit.상호명, textAlign: tAlign, unit: edSelectedUnit };

  edRenderAllBoxes(); edRenderUnitList();
  const all = edActiveDong === '전체' ? edUnits : edUnits.filter(u => u.동 === edActiveDong);
  const idx = all.findIndex(u => u.호수 === edSelectedUnit.호수);
  const next = all.slice(idx + 1).find(u => !edBoxes[u.호수]);
  if (next) edSelectUnit(next); else { edSelectedUnit = null; edRenderUnitList(); }
}

// ── 박스 렌더 ──
function edRenderAllBoxes() {
  const wr = document.getElementById('edCanvasWrapper');
  wr.querySelectorAll('.obox').forEach(el=>el.remove());
  for (const [hosu,b] of Object.entries(edBoxes)) {
    const el = document.createElement('div');
    el.className = 'obox'+(edSelectedUnit?.호수===hosu?' obox-selected':'');
    el.dataset.hosu = hosu;
    el.style.left=b.x+'%'; el.style.top=b.y+'%'; el.style.width=b.w+'%'; el.style.height=b.h+'%';
    if (b.rot) el.style.transform = `rotate(${b.rot}deg)`;
    const ta = b.textAlign || 'left';
    el.innerHTML = `<div class="obox-hosu">${hosu}</div><div class="obox-name" style="text-align:${ta}">${b.unit.상호명||hosu}</div><div class="obox-del">✕</div><div class="obox-rotate" title="회전">↻</div><div class="obox-resize"></div>`;
    el.querySelector('.obox-del').addEventListener('click',ev=>{ev.stopPropagation();delete edBoxes[hosu];edRenderAllBoxes();edRenderUnitList();});
    el.querySelector('.obox-rotate').addEventListener('mousedown',edStartRotate);
    el.addEventListener('mousedown',edStartDrag);
    el.querySelector('.obox-resize').addEventListener('mousedown',edStartResize);
    wr.appendChild(el);
  }
}

function edStartDrag(e) {
  if(e.target.classList.contains('obox-resize')||e.target.classList.contains('obox-del')||e.target.classList.contains('obox-rotate'))return;
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget,hosu=el.dataset.hosu,b=edBoxes[hosu];
  const sd={hosu,el,sx:e.clientX,sy:e.clientY,ox:b.x,oy:b.y};
  const move=ev=>{
    const dx=(ev.clientX-sd.sx)/(edImgNW*edZoom)*100,dy=(ev.clientY-sd.sy)/(edImgNH*edZoom)*100;
    let nx=Math.max(0,Math.min(95,sd.ox+dx)), ny=Math.max(0,Math.min(95,sd.oy+dy));
    // 상자 설정 모드: 드래그 중에도 축 고정
    if(edBoxMode && edAxisXOn){
      nx = edAxisXAnchor==='left' ? edAxisXPos : Math.max(0, edAxisXPos - b.w);
    }
    if(edBoxMode && edAxisYOn){
      ny = edAxisYAnchor==='top' ? edAxisYPos : Math.max(0, edAxisYPos - b.h);
    }
    edBoxes[sd.hosu].x=nx;edBoxes[sd.hosu].y=ny;
    sd.el.style.left=nx+'%';sd.el.style.top=ny+'%';
  };
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}
function edStartResize(e) {
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget.parentElement,hosu=el.dataset.hosu,b=edBoxes[hosu];
  const sd={hosu,el,sx:e.clientX,sy:e.clientY,ow:b.w,oh:b.h};
  const move=ev=>{const dw=(ev.clientX-sd.sx)/(edImgNW*edZoom)*100,dh=(ev.clientY-sd.sy)/(edImgNH*edZoom)*100;edBoxes[sd.hosu].w=Math.max(2,sd.ow+dw);edBoxes[sd.hosu].h=Math.max(1.5,sd.oh+dh);sd.el.style.width=edBoxes[sd.hosu].w+'%';sd.el.style.height=edBoxes[sd.hosu].h+'%';};
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}

function edStartRotate(e) {
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget.parentElement,hosu=el.dataset.hosu,b=edBoxes[hosu];
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;
  const startRot=b.rot||0;
  const move=ev=>{
    const angle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI;
    let newRot=startRot+(angle-startAngle);
    newRot=Math.round(newRot/5)*5;
    edBoxes[hosu].rot=newRot;
    el.style.transform=`rotate(${newRot}deg)`;
    // 상자 설정 모드: 이 각도를 기준 각도로 저장 (이후 새 박스에만 적용)
    if(edBoxMode){
      edBoxModeRot=newRot; edBoxModeRotSet=true;
      edUpdateAxisUI();
    }
  };
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}

// 지도에 저장 — 그룹명별 저장
function edSaveToMap(){
  const bName = document.getElementById('edBuildingSelect').value;
  if(!bName){showToast('건물을 먼저 선택하세요');return;}
  if(!Object.keys(edBoxes).length){showToast('배치된 호수가 없습니다');return;}
  if(!edImageURL){showToast('평면도 이미지를 업로드하세요');return;}
  if(!edGroupNameVal){showToast('그룹(층) 이름을 먼저 지정하세요');return;}

  const gName = edGroupNameVal;
  const boxData = Object.fromEntries(Object.entries(edBoxes).map(([k,v])=>[k,{x:v.x,y:v.y,w:v.w,h:v.h,rot:v.rot||0,name:v.unit?.상호명||'',textAlign:v.textAlign||'left'}]));

  const edInput = document.getElementById('edImgInput');
  const file = edInput?.files?.[0];

  function doSave(imgDataURL) {
    if (!floorplans[bName]) floorplans[bName] = {};
    floorplans[bName][gName] = {
      boxes: boxData,
      groupName: gName,
      imgDataURL,
      savedAt: new Date().toISOString()
    };
    try {
      localStorage.setItem(FLOORPLAN_KEY, JSON.stringify(floorplans));
      showToast(`✅ '${bName}/${gName}' 평면도 저장 완료`);
      const cid = 'card_'+btoa(encodeURIComponent(bName)).replace(/[^a-zA-Z0-9]/g,'_');
      rebuildCard(cid, bName);
      edRenderGroupTabs(bName);
    } catch(e) {
      // localStorage \uc6a9\ub7c9 \ucd08\uacfc \uc2dc: \ub2e8\uacc4\uc801 \ud488\uc9c8 \uc800\ud558
      tryCompressedSave(imgDataURL, bName, boxData);
    }
  }

  if (file) {
    // 원본 파일이 있으면 FileReader로 직접 읽기 (화질 손실 없음)
    const reader = new FileReader();
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(file);
  } else {
    // 파일이 없으면 (reloaded from blob) canvas로 저장
    const img = document.getElementById('ed-floorplan-img');
    const cvs = document.createElement('canvas');
    cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
    cvs.getContext('2d').drawImage(img, 0, 0);
    // WebP 지원시 WebP(무손실에 가까운), 미지원시 PNG
    const supportsWebP = cvs.toDataURL('image/webp').startsWith('data:image/webp');
    doSave(supportsWebP ? cvs.toDataURL('image/webp', 0.95) : cvs.toDataURL('image/png'));
  }
}

function tryCompressedSave(originalURL, bName, boxData) {
  const img2 = new Image();
  img2.onload = () => {
    const steps = [
      { max: 2400, q: 0.90 },
      { max: 1800, q: 0.85 },
      { max: 1200, q: 0.80 },
      { max: 800,  q: 0.72 },
    ];
    for (const {max, q} of steps) {
      const sc = Math.min(1, max/img2.naturalWidth, max/img2.naturalHeight);
      const c = document.createElement('canvas');
      c.width = Math.round(img2.naturalWidth*sc); c.height = Math.round(img2.naturalHeight*sc);
      c.getContext('2d').drawImage(img2, 0, 0, c.width, c.height);
      const url = c.toDataURL('image/jpeg', q);
      if (!floorplans[bName]) floorplans[bName] = {};
      floorplans[bName][edGroupNameVal||'1층'] = { boxes:boxData, groupName:edGroupNameVal||'1층', imgDataURL:url, savedAt:new Date().toISOString() };
      try { localStorage.setItem(FLOORPLAN_KEY, JSON.stringify(floorplans)); showToast(`\u2705 \uc800\uc7a5 \uc644\ub8cc (${Math.round(sc*100)}% \ud06c\uae30)`); const cid='card_'+btoa(encodeURIComponent(bName)).replace(/[^a-zA-Z0-9]/g,'_'); rebuildCard(cid,bName); return; } catch(e){}
    }
    showToast('\u274c \uc800\uc7a5 \uc2e4\ud328 (\uc0ac\uc6a9 \uac00\ub2a5\ud55c \uacf5\uac04 \ubd80\uc871)');
  };
  img2.src = originalURL;
}

// ── Export Image ──
function edExportImg() {
  if (!edImageURL) { showToast('이미지를 먼저 업로드하세요'); return; }
  const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
  const img = new Image(); img.crossOrigin='anonymous';
  img.onload = () => {
    cvs.width=img.naturalWidth; cvs.height=img.naturalHeight;
    ctx.drawImage(img,0,0);
    for(const[hosu,b]of Object.entries(edBoxes)){
      const x=b.x/100*cvs.width,y=b.y/100*cvs.height,w=b.w/100*cvs.width,h=b.h/100*cvs.height;
      ctx.save();
      if(b.rot){ctx.translate(x+w/2,y+h/2);ctx.rotate(b.rot*Math.PI/180);ctx.translate(-(x+w/2),-(y+h/2));}
      ctx.fillStyle='rgba(37,99,235,.15)';ctx.strokeStyle='#2563eb';ctx.lineWidth=Math.max(1.5,cvs.width/800);
      ctx.beginPath();ctx.rect(x,y,w,h);ctx.fill();ctx.stroke();
      const fs=Math.max(10,h*.42);
      ctx.fillStyle='#1a1c2a';ctx.font=`700 ${fs}px "Noto Sans KR",sans-serif`;ctx.save();ctx.beginPath();ctx.rect(x+2,y,w-4,h);ctx.clip();ctx.fillText(b.unit?.상호명||hosu,x+3,y+h*0.5+fs*0.35);ctx.restore();
      ctx.restore();
    }
    const a=document.createElement('a');a.download='평면도_상호명.png';a.href=cvs.toDataURL('image/png');a.click();showToast('✅ 이미지 저장 완료');
  };
  img.src=edImageURL;
}

// ── Layout Save/Load (JSON 파일) ──
function edSaveLayout() {
  if(!Object.keys(edBoxes).length){showToast('배치된 호수가 없습니다');return;}
  const bName = document.getElementById('edBuildingSelect').value;
  const data={version:3,savedAt:new Date().toISOString(),building:bName,groupName:edGroupNameVal||'',units:edUnits,boxes:Object.fromEntries(Object.entries(edBoxes).map(([k,v])=>[k,{x:v.x,y:v.y,w:v.w,h:v.h,rot:v.rot||0,name:v.unit?.상호명||''}]))};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${bName||'평면도'}_레이아웃.json`;a.click();showToast('✅ JSON 파일 저장 완료');
}
function edLoadLayout(input) {
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{
    const data=JSON.parse(e.target.result);if(!data.boxes)throw new Error('유효하지 않은 파일');
    if(data.units&&edUnits.length===0)edUnits=data.units;
    const uMap=Object.fromEntries(edUnits.map(u=>[u.호수,u]));
    edBoxes={};for(const[hosu,b]of Object.entries(data.boxes)){const unit=uMap[hosu]||(data.units?data.units.find(u=>u.호수===hosu):null);if(unit)edBoxes[hosu]={...b,unit};}
    edRenderAllBoxes();edRenderUnitList();showToast(`✅ 레이아웃 복원 완료 (${Object.keys(edBoxes).length}개)`);
  }catch(err){showToast('❌ '+err.message);}input.value='';};
  reader.readAsText(file);
}
